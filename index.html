      state.currentDataset = null;
      render();
    },
    
    deleteDataset: (id) => {
      if (confirm('Delete this dataset? This cannot be undone.')) {
        state.datasets = state.datasets.filter(d => d.id !== id);
        saveState();
        showToast('Dataset deleted', 'info');
        render();
      }
    },
    
    duplicateDataset: (id) => {
      const original = state.datasets.find(d => d.id === id);
      if (original) {
        const copy = JSON.parse(JSON.stringify(original));
        copy.id = generateId();
        copy.name = `${original.name} (copy)`;
        copy.createdAt = new Date().toISOString();
        state.datasets.push(copy);
        saveState();
        showToast('Dataset duplicated', 'success');
        render();
      }
    },
    
    updateMetadata: (datasetId, field, value) => {
      const dataset = state.datasets.find(d => d.id === datasetId);
      if (dataset) {
        dataset.metadata = dataset.metadata || {};
        dataset.metadata[field] = value;
        if (state.currentDataset?.id === datasetId) {
          state.currentDataset = dataset;
        }
        saveState();
      }
    },
    
    augment: async (id) => {
      const dataset = state.datasets.find(d => d.id === id);
      if (dataset) {
        await augmentWithLLM(dataset);
        if (state.currentDataset?.id === id) {
          state.currentDataset = dataset;
        }
      }
    },
    
    inferSingleField: async (datasetId, fieldId) => {
      const dataset = state.datasets.find(d => d.id === datasetId);
      const field = state.schema.find(f => f.id === fieldId);
      if (!dataset || !field) return;
      
      if (!state.settings.apiKey) {
        showToast('Please configure your API key in Settings', 'error');
        return;
      }
      
      state.inferringField = fieldId;
      render();
      
      try {
        const sampleRows = dataset.data ? dataset.data.rows.slice(0, 10) : [];
        const sourceUrl = dataset.metadata?.['Source URL'] || '';
        const fetchedContent = dataset.fetchedContent;
        
        // Get already filled metadata for context
        const existingMetadata = Object.entries(dataset.metadata || {})
          .filter(([k, v]) => v && (!Array.isArray(v) || v.length > 0))
          .map(([k, v]) => `- ${k}: ${Array.isArray(v) ? v.join(', ') : v}`)
          .join('\n');
        
        const prompt = `You are a data cataloger with expertise in documenting datasets from various sources worldwide (government portals, research institutions, international organizations, private sector, etc.).

## Dataset Information

**File name:** ${dataset.name}

**Columns (${dataset.data?.headers?.length || 0}):**
${dataset.data?.headers?.join(', ') || 'Unknown'}

**Sample data (first ${sampleRows.length} rows):**
${sampleRows.map((r, i) => `Row ${i + 1}: ${r.slice(0, 10).join(' | ')}${r.length > 10 ? ' ...' : ''}`).join('\n')}

${sourceUrl ? `**Source URL:** ${sourceUrl}` : ''}

${fetchedContent ? `
## Source Page Information (fetched from URL)

**Page Title:** ${fetchedContent.title || 'Not found'}
**Description:** ${fetchedContent.description || 'Not found'}
**Agency/Publisher:** ${fetchedContent.agency || 'Not found'}
${fetchedContent.keywords?.length ? `**Keywords:** ${fetchedContent.keywords.join(', ')}` : ''}

**Page Content Extract:**
${fetchedContent.pageText?.slice(0, 1500) || 'Not available'}
` : ''}

${existingMetadata ? `## Already Filled Metadata\n${existingMetadata}` : ''}

## Task

Infer this field based on all available context:

**Field Name:** ${field.name}
**Field Type:** ${field.type}
${field.type === 'enum' ? `**Allowed Values:** ${(field.options || []).join(', ')}` : ''}

RULES:
1. You MUST provide a value. Never respond with "unknown", "null", "n/a", or empty.
2. Use clues from: URL domain, page content, column names, data samples, existing metadata.
3. Apply your knowledge about common data sources, licensing, methodologies, and standards.
4. If exact info isn't available, make a reasonable inference based on context.
${field.type === 'tags' ? '5. Return comma-separated values like: tag1, tag2, tag3' : ''}
${field.type === 'enum' ? `5. Return exactly one of: ${(field.options || []).join(', ')}` : ''}

Respond with ONLY the value. No quotes, no explanation, no prefixes.`;

        const responseText = await callLLM(prompt);
        let value = responseText.trim();
        
        // Clean up common AI response artifacts
        value = value.replace(/^["']|["']$/g, ''); // Remove surrounding quotes
        value = value.replace(/^(Value:|Answer:|Result:)\s*/i, ''); // Remove prefixes
        
        // Check if AI still couldn't determine (be more lenient)
        const invalidResponses = ['unknown', 'null', 'n/a', 'not available', 'not found', 'none', 'undefined'];
        if (!value || invalidResponses.includes(value.toLowerCase())) {
          showToast(`Could not infer "${field.name}" - try adding more context`, 'warning');
        } else {
          // Parse based on field type
          if (field.type === 'tags') {
            value = value.split(',').map(s => s.trim()).filter(Boolean);
          } else if (field.type === 'boolean') {
            value = value.toLowerCase() === 'yes' || value.toLowerCase() === 'true';
          } else if (field.type === 'number') {
            value = parseFloat(value) || value;
          }
          
          dataset.metadata = dataset.metadata || {};
          dataset.metadata[field.name] = value;
          saveState();
          showToast(`"${field.name}" filled!`, 'success');
        }
        
      } catch (error) {
        showToast(`Failed to infer: ${error.message}`, 'error');
      }
      
      state.inferringField = null;
      if (state.currentDataset?.id === datasetId) {
        state.currentDataset = dataset;
      }
      render();
    },
    
    augmentEmptyFields: async (datasetId) => {
      const dataset = state.datasets.find(d => d.id === datasetId);
      if (!dataset) return;
      
      if (!state.settings.apiKey) {
        showToast('Please configure your API key in Settings', 'error');
        return;
      }
      
      // Find empty AI-inferable fields
      const emptyFields = state.schema.filter(f => {
        if (!f.aiInfer) return false;
        const val = dataset.metadata?.[f.name];
        return !val || (Array.isArray(val) && val.length === 0);
      });
      
      if (emptyFields.length === 0) {
        showToast('All fields are already filled!', 'success');
        return;
      }
      
      state.augmenting = true;
      state.augmentLog = [`🚀 Filling ${emptyFields.length} empty fields...`];
      render();
      
      try {
        const sampleRows = dataset.data ? dataset.data.rows.slice(0, 10) : [];
        const sourceUrl = dataset.metadata?.['Source URL'] || '';
        const fetchedContent = dataset.fetchedContent;
        
        const prompt = `You are a data cataloger with expertise in documenting datasets from various sources worldwide.

## Dataset Information

**File name:** ${dataset.name}

**Columns (${dataset.data?.headers?.length || 0}):**
${dataset.data?.headers?.join(', ') || 'Unknown'}

**Sample data (first ${sampleRows.length} rows):**
${sampleRows.map((r, i) => `Row ${i + 1}: ${r.slice(0, 10).join(' | ')}${r.length > 10 ? ' ...' : ''}`).join('\n')}

${sourceUrl ? `**Source URL:** ${sourceUrl}` : ''}

${fetchedContent ? `
## Source Page Information (fetched from URL)

**Page Title:** ${fetchedContent.title || 'Not found'}
**Description:** ${fetchedContent.description || 'Not found'}
**Agency/Publisher:** ${fetchedContent.agency || 'Not found'}
${fetchedContent.keywords?.length ? `**Keywords:** ${fetchedContent.keywords.join(', ')}` : ''}
${fetchedContent.license ? `**License mentioned:** ${fetchedContent.license}` : ''}

**Page Content Extract:**
${fetchedContent.pageText?.slice(0, 2000) || 'Not available'}
` : ''}

## Already Filled Metadata
${Object.entries(dataset.metadata || {}).filter(([k, v]) => v && (!Array.isArray(v) || v.length > 0)).map(([k, v]) => `**${k}:** ${Array.isArray(v) ? v.join(', ') : v}`).join('\n') || 'None'}

## Task

Fill these empty fields using all available context:

${emptyFields.map(f => {
  if (f.type === 'tags') return `"${f.name}": ["tag1", "tag2", "tag3"]`;
  if (f.type === 'enum') return `"${f.name}": "one of: ${(f.options || []).join(', ')}"`;
  if (f.type === 'boolean') return `"${f.name}": true or false`;
  return `"${f.name}": "inferred value"`;
}).join(',\n')}

RULES:
- Provide a value for EVERY field. Never use null or empty values.
- Use clues from URL, page content, column names, data samples, and already filled metadata.
- Apply your knowledge of common data sources, licensing, and documentation standards.
- Return ONLY valid JSON object with these exact keys.`;

        state.augmentLog.push(`🤖 Calling ${state.settings.providers[state.settings.provider].name} API...`);
        render();
        
        const responseText = await callLLM(prompt);
        
        state.augmentLog.push('🔍 Parsing response...');
        render();
        
        const jsonMatch = responseText.match(/\{[\s\S]*\}/);
        if (!jsonMatch) {
          throw new Error('Could not parse LLM response as JSON');
        }
        
        const parsed = JSON.parse(jsonMatch[0]);
        
        // Merge inferred metadata
        dataset.metadata = dataset.metadata || {};
        let filledCount = 0;
        Object.entries(parsed).forEach(([key, value]) => {
          if (value !== null && value !== 'null' && value !== '' && value !== 'UNKNOWN') {
            dataset.metadata[key] = value;
            filledCount++;
          }
        });
        
        dataset.augmented = true;
        dataset.augmentedAt = new Date().toISOString();
        
        state.augmentLog.push(`✅ Filled ${filledCount} fields!`);
        showToast(`Filled ${filledCount} empty fields!`, 'success');
        saveState();
        
      } catch (error) {
        state.augmentLog.push(`❌ Error: ${error.message}`);
        showToast(`Augmentation failed: ${error.message}`, 'error');
      }
      
      state.augmenting = false;
      if (state.currentDataset?.id === datasetId) {
        state.currentDataset = dataset;
      }
      render();
    },
    
    exportDataset: (id) => {
      const dataset = state.datasets.find(d => d.id === id);
      if (!dataset) return;
      
      const exportData = {
        name: dataset.name,
        metadata: dataset.metadata,
        schema: state.schema,
        stats: computeStats(dataset.data),
        augmented: dataset.augmented,
        exportedAt: new Date().toISOString()
      };
      
      const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${dataset.name.replace(/\.[^.]+$/, '')}-metadata.json`;
      a.click();
    },
    
    exportFullDataset: (id) => {
      const dataset = state.datasets.find(d => d.id === id);
      if (!dataset) return;
      
      const exportData = {
        name: dataset.name,
        metadata: dataset.metadata,
        schema: state.schema,
        data: dataset.data,
        stats: computeStats(dataset.data),
        augmented: dataset.augmented,
        createdAt: dataset.createdAt,
        exportedAt: new Date().toISOString()
      };
      
      const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${dataset.name.replace(/\.[^.]+$/, '')}-full.json`;
      a.click();
    },
    
    exportMetadataCSV: (id) => {
      const dataset = state.datasets.find(d => d.id === id);
      if (!dataset) return;
      
      // Build CSV rows: Field, Value
      const rows = [['Field', 'Value']];
      state.schema.forEach(field => {
        let value = dataset.metadata?.[field.name] || '';
        // Handle arrays (tags)
        if (Array.isArray(value)) {
          value = value.join('; ');
        }
        // Escape quotes and wrap in quotes if contains comma
        value = String(value).replace(/"/g, '""');
        if (value.includes(',') || value.includes('\n') || value.includes('"')) {
          value = `"${value}"`;
        }
        rows.push([field.name, value]);
      });
      
      // Add dataset info
      rows.push(['---', '---']);
      rows.push(['Dataset Name', dataset.name]);
      rows.push(['Row Count', dataset.data?.rows?.length || 0]);
      rows.push(['Column Count', dataset.data?.headers?.length || 0]);
      rows.push(['Augmented', dataset.augmented ? 'Yes' : 'No']);
      rows.push(['Exported At', new Date().toISOString()]);
      
      const csvContent = rows.map(row => row.join(',')).join('\n');
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${dataset.name.replace(/\.[^.]+$/, '')}-metadata.csv`;
      a.click();
      showToast('Exported as CSV', 'success');
    },
    
    exportMetadataExcel: (id) => {
      const dataset = state.datasets.find(d => d.id === id);
      if (!dataset) return;
      
      // Build data for Excel
      const wsData = [['Field', 'Value', 'Type', 'Required']];
      state.schema.forEach(field => {
        let value = dataset.metadata?.[field.name] || '';
        if (Array.isArray(value)) {
          value = value.join('; ');
        }
        wsData.push([field.name, value, field.type, field.required ? 'Yes' : 'No']);
      });
      
      // Add blank row and dataset info
      wsData.push([]);
      wsData.push(['Dataset Info', '', '', '']);
      wsData.push(['Dataset Name', dataset.name, '', '']);
      wsData.push(['Row Count', dataset.data?.rows?.length || 0, '', '']);
      wsData.push(['Column Count', dataset.data?.headers?.length || 0, '', '']);
      wsData.push(['Columns', (dataset.data?.headers || []).join(', '), '', '']);
      wsData.push(['Augmented', dataset.augmented ? 'Yes' : 'No', '', '']);
      wsData.push(['Exported At', new Date().toISOString(), '', '']);
      
      // Create workbook
      const ws = XLSX.utils.aoa_to_sheet(wsData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Metadata');
      
      // Auto-size columns
      ws['!cols'] = [{ wch: 25 }, { wch: 60 }, { wch: 12 }, { wch: 10 }];
      
      // Export
      XLSX.writeFile(wb, `${dataset.name.replace(/\.[^.]+$/, '')}-metadata.xlsx`);
      showToast('Exported as Excel', 'success');
    },
    
    exportAllMetadataCSV: () => {
      if (state.datasets.length === 0) {
        showToast('No datasets to export', 'error');
        return;
      }
      
      // Build header row from schema
      const headers = ['Dataset Name', ...state.schema.map(f => f.name), 'Row Count', 'Columns', 'Augmented'];
      const rows = [headers];
      
      state.datasets.forEach(dataset => {
        const row = [dataset.name];
        state.schema.forEach(field => {
          let value = dataset.metadata?.[field.name] || '';
          if (Array.isArray(value)) value = value.join('; ');
          value = String(value).replace(/"/g, '""');
          if (value.includes(',') || value.includes('\n') || value.includes('"')) {
            value = `"${value}"`;
          }
          row.push(value);
        });
        row.push(dataset.data?.rows?.length || 0);
        row.push(dataset.data?.headers?.length || 0);
        row.push(dataset.augmented ? 'Yes' : 'No');
        rows.push(row);
      });
      
      const csvContent = rows.map(row => row.join(',')).join('\n');
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `all-datasets-metadata-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      showToast(`Exported ${state.datasets.length} datasets as CSV`, 'success');
    },
    
    exportAllMetadataExcel: () => {
      if (state.datasets.length === 0) {
        showToast('No datasets to export', 'error');
        return;
      }
      
      // Build header row from schema
      const headers = ['Dataset Name', ...state.schema.map(f => f.name), 'Row Count', 'Columns', 'Augmented'];
      const wsData = [headers];
      
      state.datasets.forEach(dataset => {
        const row = [dataset.name];
        state.schema.forEach(field => {
          let value = dataset.metadata?.[field.name] || '';
          if (Array.isArray(value)) value = value.join('; ');
          row.push(value);
        });
        row.push(dataset.data?.rows?.length || 0);
        row.push(dataset.data?.headers?.length || 0);
        row.push(dataset.augmented ? 'Yes' : 'No');
        wsData.push(row);
      });
      
      const ws = XLSX.utils.aoa_to_sheet(wsData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'All Datasets');
      
      // Auto-size first column
      ws['!cols'] = [{ wch: 30 }, ...state.schema.map(() => ({ wch: 25 })), { wch: 10 }, { wch: 10 }, { wch: 10 }];
      
      XLSX.writeFile(wb, `all-datasets-metadata-${new Date().toISOString().slice(0,10)}.xlsx`);
      showToast(`Exported ${state.datasets.length} datasets as Excel`, 'success');
    }
  };
})();

// Initialize app when DOM is ready
document.addEventListener('DOMContentLoaded', App.init);
  </script>
</body>
</html>
