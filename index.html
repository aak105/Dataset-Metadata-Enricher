<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dataset Metadata Augmenter — AI-Powered Dataset Cataloging</title>
  <meta name="description" content="Transform undocumented datasets into well-cataloged data assets. AI-powered metadata generation with World Bank standards and OpenMetadata integration.">
  <meta name="author" content="Aakash Sharma">
  <meta name="keywords" content="metadata, dataset, cataloging, AI, LLM, OpenMetadata, data governance, open data">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    /* ============================================
       CSS VARIABLES & THEME - Professional Dark Theme
       ============================================ */
    :root {
      /* Colors - Dark theme default */
      --color-bg-base: #0a0a0b;
      --color-bg-surface: #111113;
      --color-bg-elevated: #18181b;
      --color-bg-hover: #222225;
      --color-bg-accent: #1a1a2e;
      
      --color-text-primary: #fafafa;
      --color-text-secondary: #a1a1aa;
      --color-text-muted: #71717a;
      
      --color-border: rgba(255, 255, 255, 0.08);
      --color-border-strong: rgba(255, 255, 255, 0.15);
      
      /* Accent colors */
      --color-accent-primary: #6366f1;
      --color-accent-primary-hover: #818cf8;
      --color-accent-secondary: #22d3ee;
      --color-accent-success: #34d399;
      --color-accent-warning: #fbbf24;
      --color-accent-danger: #f87171;
      
      /* Gradients */
      --gradient-hero: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #d946ef 100%);
      --gradient-subtle: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(139, 92, 246, 0.05) 100%);
      --gradient-card: linear-gradient(145deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0) 100%);
      
      /* Typography */
      --font-sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
      
      /* Spacing */
      --space-xs: 0.25rem;
      --space-sm: 0.5rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --space-2xl: 3rem;
      --space-3xl: 4rem;
      
      /* Border radius */
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      
      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.15);
      
      /* For the tool section - keep original light/dark */
      --color-background-primary: #18181b;
      --color-background-secondary: #222225;
      --color-background-tertiary: #111113;
      --color-background-info: #1e3a5f;
      --color-background-success: #14532d;
      --color-background-warning: #713f12;
      --color-background-danger: #7f1d1d;
      
      --color-text-info: #7dd3fc;
      --color-text-success: #86efac;
      --color-text-warning: #fcd34d;
      --color-text-danger: #fca5a5;
      
      --color-border-primary: rgba(255, 255, 255, 0.2);
      --color-border-secondary: rgba(255, 255, 255, 0.15);
      --color-border-tertiary: rgba(255, 255, 255, 0.08);
    }
    
    /* Light theme */
    @media (prefers-color-scheme: light) {
      :root {
        --color-bg-base: #fafafa;
        --color-bg-surface: #ffffff;
        --color-bg-elevated: #ffffff;
        --color-bg-hover: #f4f4f5;
        --color-bg-accent: #eef2ff;
        
        --color-text-primary: #18181b;
        --color-text-secondary: #52525b;
        --color-text-muted: #a1a1aa;
        
        --color-border: rgba(0, 0, 0, 0.06);
        --color-border-strong: rgba(0, 0, 0, 0.12);
        
        --gradient-subtle: linear-gradient(135deg, rgba(99, 102, 241, 0.08) 0%, rgba(139, 92, 246, 0.03) 100%);
        --gradient-card: linear-gradient(145deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.4) 100%);
        
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.1);
        
        /* Tool section light theme */
        --color-background-primary: #ffffff;
        --color-background-secondary: #f4f4f5;
        --color-background-tertiary: #fafafa;
        --color-background-info: #eff6ff;
        --color-background-success: #f0fdf4;
        --color-background-warning: #fffbeb;
        --color-background-danger: #fef2f2;
        
        --color-text-info: #1d4ed8;
        --color-text-success: #15803d;
        --color-text-warning: #a16207;
        --color-text-danger: #b91c1c;
        
        --color-border-primary: rgba(0, 0, 0, 0.2);
        --color-border-secondary: rgba(0, 0, 0, 0.12);
        --color-border-tertiary: rgba(0, 0, 0, 0.06);
      }
    }
    
    /* ============================================
       RESET & BASE STYLES
       ============================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      scroll-behavior: smooth;
    }
    
    body {
      font-family: var(--font-sans);
      background: var(--color-bg-base);
      color: var(--color-text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }
    
    /* ============================================
       SITE NAVIGATION
       ============================================ */
    .site-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(10, 10, 11, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--color-border);
    }
    
    @media (prefers-color-scheme: light) {
      .site-nav {
        background: rgba(255, 255, 255, 0.85);
      }
    }
    
    .site-nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 var(--space-xl);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .site-logo {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--color-text-primary);
      text-decoration: none;
    }
    
    .site-logo-icon {
      width: 32px;
      height: 32px;
      background: var(--gradient-hero);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }
    
    .site-nav-links {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }
    
    .site-nav-link {
      padding: var(--space-sm) var(--space-md);
      color: var(--color-text-secondary);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      border-radius: var(--radius-sm);
      transition: all 0.2s ease;
    }
    
    .site-nav-link:hover {
      color: var(--color-text-primary);
      background: var(--color-bg-hover);
    }
    
    .site-nav-link.active {
      color: var(--color-accent-primary);
    }
    
    .site-nav-cta {
      padding: var(--space-sm) var(--space-lg);
      background: var(--color-accent-primary);
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: var(--radius-md);
      transition: all 0.2s ease;
    }
    
    .site-nav-cta:hover {
      background: var(--color-accent-primary-hover);
      transform: translateY(-1px);
    }
    
    /* ============================================
       THEME TOGGLE
       ============================================ */
    .theme-toggle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--color-bg-elevated);
      border: 1px solid var(--color-border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: all 0.2s ease;
      padding: 0;
      margin: 0 var(--space-sm);
    }
    
    .theme-toggle:hover {
      background: var(--color-bg-hover);
      border-color: var(--color-border-strong);
      transform: scale(1.05);
    }
    
    /* Default: dark theme shows moon, light shows sun */
    .theme-icon-light { display: none; }
    .theme-icon-dark { display: inline; }
    
    /* Light theme: show sun, hide moon */
    [data-theme="light"] .theme-icon-light { display: inline; }
    [data-theme="light"] .theme-icon-dark { display: none; }
    
    /* Dark theme: show moon, hide sun */
    [data-theme="dark"] .theme-icon-light { display: none; }
    [data-theme="dark"] .theme-icon-dark { display: inline; }
    
    /* System preference when no data-theme set */
    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) .theme-icon-light { display: inline; }
      :root:not([data-theme="dark"]) .theme-icon-dark { display: none; }
    }
    
    /* ============================================
       MANUAL THEME OVERRIDES
       ============================================ */
    [data-theme="light"] {
      --color-bg-base: #fafafa;
      --color-bg-surface: #ffffff;
      --color-bg-elevated: #ffffff;
      --color-bg-hover: #f4f4f5;
      --color-bg-accent: #eef2ff;
      
      --color-text-primary: #18181b;
      --color-text-secondary: #52525b;
      --color-text-muted: #a1a1aa;
      
      --color-border: rgba(0, 0, 0, 0.06);
      --color-border-strong: rgba(0, 0, 0, 0.12);
      
      --gradient-subtle: linear-gradient(135deg, rgba(99, 102, 241, 0.08) 0%, rgba(139, 92, 246, 0.03) 100%);
      --gradient-card: linear-gradient(145deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.4) 100%);
      
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
      --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.1);
      
      --color-background-primary: #ffffff;
      --color-background-secondary: #f4f4f5;
      --color-background-tertiary: #fafafa;
      --color-background-info: #eff6ff;
      --color-background-success: #f0fdf4;
      --color-background-warning: #fffbeb;
      --color-background-danger: #fef2f2;
      
      --color-text-info: #1d4ed8;
      --color-text-success: #15803d;
      --color-text-warning: #a16207;
      --color-text-danger: #b91c1c;
      
      --color-border-primary: rgba(0, 0, 0, 0.2);
      --color-border-secondary: rgba(0, 0, 0, 0.12);
      --color-border-tertiary: rgba(0, 0, 0, 0.06);
    }
    
    [data-theme="light"] .site-nav {
      background: rgba(255, 255, 255, 0.85);
    }
    
    [data-theme="dark"] {
      --color-bg-base: #0a0a0b;
      --color-bg-surface: #111113;
      --color-bg-elevated: #18181b;
      --color-bg-hover: #222225;
      --color-bg-accent: #1a1a2e;
      
      --color-text-primary: #fafafa;
      --color-text-secondary: #a1a1aa;
      --color-text-muted: #71717a;
      
      --color-border: rgba(255, 255, 255, 0.08);
      --color-border-strong: rgba(255, 255, 255, 0.15);
      
      --gradient-subtle: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(139, 92, 246, 0.05) 100%);
      --gradient-card: linear-gradient(145deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0) 100%);
      
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.15);
      
      --color-background-primary: #18181b;
      --color-background-secondary: #222225;
      --color-background-tertiary: #111113;
      --color-background-info: #1e3a5f;
      --color-background-success: #14532d;
      --color-background-warning: #713f12;
      --color-background-danger: #7f1d1d;
      
      --color-text-info: #7dd3fc;
      --color-text-success: #86efac;
      --color-text-warning: #fcd34d;
      --color-text-danger: #fca5a5;
      
      --color-border-primary: rgba(255, 255, 255, 0.2);
      --color-border-secondary: rgba(255, 255, 255, 0.15);
      --color-border-tertiary: rgba(255, 255, 255, 0.08);
    }
    
    [data-theme="dark"] .site-nav {
      background: rgba(10, 10, 11, 0.8);
    }
    
    /* ============================================
       HERO SECTION
       ============================================ */
    .hero {
      padding: calc(64px + var(--space-3xl)) var(--space-xl) var(--space-3xl);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    
    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 600px;
      background: radial-gradient(ellipse at center, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    
    .hero-content {
      max-width: 800px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-xs) var(--space-md);
      background: var(--gradient-subtle);
      border: 1px solid var(--color-border);
      border-radius: 100px;
      font-size: 0.85rem;
      color: var(--color-accent-primary);
      margin-bottom: var(--space-lg);
    }
    
    .hero-badge-dot {
      width: 6px;
      height: 6px;
      background: var(--color-accent-success);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .hero-title {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: var(--space-lg);
      letter-spacing: -0.02em;
    }
    
    .hero-title-gradient {
      background: var(--gradient-hero);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .hero-description {
      font-size: 1.25rem;
      color: var(--color-text-secondary);
      max-width: 600px;
      margin: 0 auto var(--space-xl);
      line-height: 1.7;
    }
    
    .hero-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-md);
      flex-wrap: wrap;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-md) var(--space-xl);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      border-radius: var(--radius-md);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }
    
    .btn-primary {
      background: var(--color-accent-primary);
      color: white;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
    }
    
    .btn-primary:hover {
      background: var(--color-accent-primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
    }
    
    .btn-secondary {
      background: var(--color-bg-elevated);
      color: var(--color-text-primary);
      border: 1px solid var(--color-border-strong);
    }
    
    .btn-secondary:hover {
      background: var(--color-bg-hover);
      border-color: var(--color-text-muted);
    }
    
    .hero-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-xl);
      margin-top: var(--space-xl);
    }
    
    .hero-link {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      color: var(--color-text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    
    .hero-link:hover {
      color: var(--color-text-primary);
    }
    
    /* ============================================
       FEATURES SECTION
       ============================================ */
    .features {
      padding: var(--space-3xl) var(--space-xl);
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .section-header {
      text-align: center;
      margin-bottom: var(--space-2xl);
    }
    
    .section-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: var(--space-md);
    }
    
    .section-description {
      color: var(--color-text-secondary);
      font-size: 1.1rem;
      max-width: 600px;
      margin: 0 auto;
    }
    
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: var(--space-lg);
    }
    
    .feature-card {
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      transition: all 0.3s ease;
    }
    
    .feature-card:hover {
      border-color: var(--color-border-strong);
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }
    
    .feature-icon {
      width: 48px;
      height: 48px;
      background: var(--gradient-subtle);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: var(--space-md);
    }
    
    .feature-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: var(--space-sm);
    }
    
    .feature-description {
      color: var(--color-text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
    }
    
    /* ============================================
       COMPARISON TABLE
       ============================================ */
    .comparison {
      padding: var(--space-3xl) var(--space-xl);
      max-width: 900px;
      margin: 0 auto;
    }
    
    .comparison-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--color-bg-surface);
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--color-border);
    }
    
    .comparison-table th,
    .comparison-table td {
      padding: var(--space-md) var(--space-lg);
      text-align: left;
      border-bottom: 1px solid var(--color-border);
    }
    
    .comparison-table th {
      background: var(--color-bg-elevated);
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--color-text-secondary);
    }
    
    .comparison-table tr:last-child td {
      border-bottom: none;
    }
    
    .comparison-table .highlight {
      background: var(--gradient-subtle);
      font-weight: 600;
    }
    
    /* ============================================
       GUIDE SECTION
       ============================================ */
    .guide {
      padding: calc(64px + var(--space-2xl)) var(--space-xl) var(--space-3xl);
      max-width: 900px;
      margin: 0 auto;
    }
    
    .guide h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: var(--space-lg);
    }
    
    .guide h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-top: var(--space-2xl);
      margin-bottom: var(--space-md);
      padding-bottom: var(--space-sm);
      border-bottom: 1px solid var(--color-border);
    }
    
    .guide h3 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-top: var(--space-xl);
      margin-bottom: var(--space-sm);
    }
    
    .guide p {
      color: var(--color-text-secondary);
      margin-bottom: var(--space-md);
      line-height: 1.8;
    }
    
    .guide ul, .guide ol {
      color: var(--color-text-secondary);
      margin-bottom: var(--space-md);
      padding-left: var(--space-xl);
    }
    
    .guide li {
      margin-bottom: var(--space-sm);
    }
    
    .guide code {
      font-family: var(--font-mono);
      font-size: 0.9em;
      background: var(--color-bg-elevated);
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
    }
    
    .guide pre {
      background: var(--color-bg-elevated);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-lg);
      overflow-x: auto;
      margin-bottom: var(--space-lg);
    }
    
    .guide pre code {
      background: none;
      border: none;
      padding: 0;
    }
    
    .guide-step {
      display: flex;
      gap: var(--space-lg);
      margin-bottom: var(--space-xl);
      padding: var(--space-lg);
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
    }
    
    .guide-step-number {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      background: var(--gradient-hero);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    
    .guide-step-content h4 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: var(--space-sm);
    }

    const data = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });
    
    if (data.length === 0) {
      return { headers: [], rows: [] };
    }
    
    return {
      headers: data[0].map(h => String(h).trim()),
      rows: data.slice(1).map(row => row.map(cell => String(cell)))

    const headers = Object.keys(json[0]);
    const rows = json.map(obj => headers.map(h => String(obj[h] ?? '')));
    
    return { headers, rows };

  /**
   * Compute comprehensive statistics for a dataset
   * Scans FULL data for accurate metadata inference
   */
  const computeStats = (data) => {
    if (!data || !data.rows || data.rows.length === 0) {
      return null;
    }
    
    const stats = {
      rowCount: data.rows.length,
      colCount: data.headers.length,
      columns: [],
      // Summary fields for LLM context
      timeRange: null,       // { min: '2010', max: '2023' }
      geographicValues: [],  // All unique geographic values found
      allYears: [],          // All years found in data
      categorySummary: {}    // { columnName: [all unique values] }
    };
    
    // Patterns for detection
    const yearPattern = /^(19|20)\d{2}$/;
    const datePattern = /^\d{4}[-/]\d{2}[-/]\d{2}|^\d{2}[-/]\d{2}[-/]\d{4}/;
    const geoKeywords = ['state', 'district', 'country', 'region', 'city', 'village', 'block', 'location', 'place', 'area', 'zone', 'tehsil', 'taluk', 'mandal', 'province'];
    const yearKeywords = ['year', 'yr', 'date', 'period', 'time', 'fiscal', 'fy', 'ay'];
    
    const allYearsFound = new Set();
    const allGeoValues = new Set();
    
    data.headers.forEach((header, colIndex) => {
      const headerLower = header.toLowerCase();
      const values = data.rows.map(row => row[colIndex] || '');
      const nonEmpty = values.filter(v => v && String(v).trim());
      const unique = [...new Set(nonEmpty.map(v => String(v).trim()))];
      const numeric = nonEmpty.filter(v => !isNaN(parseFloat(v)));
      
      // Detect if column contains years
      const years = unique.filter(v => yearPattern.test(String(v).trim()));
      const isYearColumn = years.length > unique.length * 0.5 || 
                          yearKeywords.some(k => headerLower.includes(k));
      
      // Detect date patterns
      const dates = nonEmpty.filter(v => datePattern.test(String(v)));
      const isDateColumn = dates.length > nonEmpty.length * 0.5;
      
      // Detect geographic columns
      const isGeoColumn = geoKeywords.some(k => headerLower.includes(k));
      
      // Detect if it's a categorical column (low cardinality relative to rows)
      const isCategorical = unique.length <= 100 && unique.length < data.rows.length * 0.5;
      
      // Collect years from year columns
      if (isYearColumn) {
        years.forEach(y => allYearsFound.add(String(y).trim()));
      }
      
      // Extract years from date columns
      if (isDateColumn) {
        dates.forEach(d => {
          const match = String(d).match(/(19|20)\d{2}/);
          if (match) allYearsFound.add(match[0]);
        });
      }
      
      // Collect geographic values
      if (isGeoColumn) {
        unique.forEach(v => {
          if (v && v.length > 1 && v.length < 100) {
            allGeoValues.add(String(v).trim());
          }
        });
      }
      
      // Store category summary for categorical columns
      if (isCategorical && unique.length > 0) {
        stats.categorySummary[header] = unique;
      }
      
      // Compute numeric stats
      let min = null, max = null, hasDecimals = false;
      if (numeric.length > 0) {
        const numericValues = numeric.map(v => parseFloat(v));
        min = Math.min(...numericValues);
        max = Math.max(...numericValues);
        hasDecimals = numericValues.some(v => v % 1 !== 0);
      }
      
      stats.columns.push({
        name: header,
        fillRate: Math.round((nonEmpty.length / values.length) * 100),
        uniqueCount: unique.length,
        totalCount: values.length,
        isNumeric: numeric.length > nonEmpty.length * 0.8,
        isDate: isDateColumn,
        isYear: isYearColumn,
        isGeographic: isGeoColumn,
        isCategorical: isCategorical,
        hasDecimals: hasDecimals,
        sample: unique.slice(0, 5),
        allValues: isCategorical ? unique : null,  // Full list for categorical
        min: min,
        max: max
      });
    });
    
    // Compile time range from all years found
    const yearsArray = [...allYearsFound].map(y => parseInt(y)).filter(y => !isNaN(y)).sort((a, b) => a - b);
    if (yearsArray.length > 0) {
      stats.timeRange = {
        min: yearsArray[0],
        max: yearsArray[yearsArray.length - 1],
        years: yearsArray
      };
      stats.allYears = yearsArray;
    }
    
    // Compile geographic values
    stats.geographicValues = [...allGeoValues].sort();
    
    return stats;
  };

  /**
   * Extract metadata from HTML content
   */
  const extractMetadataFromHtml = (html, url) => {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    
    // Extract title
    let title = '';
    const titleEl = doc.querySelector('title');
    const ogTitle = doc.querySelector('meta[property="og:title"]');
    const h1 = doc.querySelector('h1');
    title = ogTitle?.content || titleEl?.textContent || h1?.textContent || '';
    title = title.trim();
    
    // Extract description
    let description = '';
    const metaDesc = doc.querySelector('meta[name="description"]');
    const ogDesc = doc.querySelector('meta[property="og:description"]');
    description = ogDesc?.content || metaDesc?.content || '';
    description = description.trim();
    
    // Try to extract agency/organization
    let agency = '';
    const ogSiteName = doc.querySelector('meta[property="og:site_name"]');
    const publisher = doc.querySelector('meta[name="publisher"]');
    const author = doc.querySelector('meta[name="author"]');
    agency = ogSiteName?.content || publisher?.content || author?.content || '';
    
    // Try to detect from common Indian gov sites
    if (!agency) {
      if (url.includes('ndap.niti.gov.in')) agency = 'National Data & Analytics Platform (NDAP), NITI Aayog';
      else if (url.includes('data.gov.in')) agency = 'Open Government Data Platform India';
      else if (url.includes('mospi.gov.in') || url.includes('mospi.nic.in')) agency = 'Ministry of Statistics and Programme Implementation';
      else if (url.includes('rbi.org.in')) agency = 'Reserve Bank of India';
      else if (url.includes('censusindia.gov.in')) agency = 'Office of the Registrar General & Census Commissioner, India';
      else if (url.includes('niti.gov.in')) agency = 'NITI Aayog';
      else if (url.includes('pib.gov.in')) agency = 'Press Information Bureau';
      else if (url.includes('epwrfits.in')) agency = 'EPW Research Foundation';
      else if (url.includes('indiastat.com')) agency = 'Indiastat';
      else if (url.includes('agricoop.nic.in')) agency = 'Ministry of Agriculture & Farmers Welfare';
      else if (url.includes('eands.dacnet.nic.in')) agency = 'Directorate of Economics & Statistics, Ministry of Agriculture';
      else if (url.includes('nhb.gov.in')) agency = 'National Horticulture Board';
      else if (url.includes('updes.up.nic.in') || url.includes('upag')) agency = 'Directorate of Economics & Statistics, Uttar Pradesh';
      else if (url.includes('.gov.in') || url.includes('.nic.in')) agency = 'Government of India';
    }
    agency = agency.trim();
    
    // Extract keywords/tags
    let keywords = [];
    const metaKeywords = doc.querySelector('meta[name="keywords"]');
    if (metaKeywords?.content) {
      keywords = metaKeywords.content.split(',').map(k => k.trim()).filter(Boolean).slice(0, 10);
    }
    
    // Extract any visible text for context (limit to reasonable size)
    let pageText = '';
    const mainContent = doc.querySelector('main, article, .content, #content, .main-content');
    if (mainContent) {
      pageText = mainContent.textContent || '';
    } else {
      pageText = doc.body?.textContent || '';
    }
    // Clean up and limit text
    pageText = pageText.replace(/\s+/g, ' ').trim().slice(0, 3000);
    
    // Look for license info
    let license = '';
    const licensePatterns = [
      /creative\s*commons/i,
      /cc[\s-]by/i,
      /open\s*data/i,
      /public\s*domain/i,
      /government\s*open\s*data\s*license/i
    ];
    for (const pattern of licensePatterns) {
      const match = pageText.match(pattern);
      if (match) {
        license = match[0];
        break;
      }
    }
    
    // Look for date/update info
    let lastUpdated = '';
    const datePatterns = [
      /(?:last\s*)?(?:updated|modified|published)[\s:]*(\d{1,2}[\s/-]\w+[\s/-]\d{4}|\d{4}[\s/-]\d{2}[\s/-]\d{2})/i,
      /(\d{1,2}[\s/-]\w+[\s/-]\d{4})/
    ];
    for (const pattern of datePatterns) {
      const match = pageText.match(pattern);
      if (match) {
        lastUpdated = match[1] || match[0];
        break;
      }
    }
    
    return {
      title,
      description,
      agency,
      keywords,
      license,
      lastUpdated,
      pageText,
      fetchedAt: new Date().toISOString()
    };
  };

  /**
   * Search the web using DuckDuckGo (via proxy to avoid CORS)
   * Returns top search results as context for the LLM
   * No API key needed!
   */
  const searchWeb = async (query) => {
    const { webSearch } = state.settings;
    
    if (!webSearch?.enabled) {
      return null;
    }
    
    // Try multiple CORS proxies
    const proxies = [
      (q) => `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://html.duckduckgo.com/html/?q=${encodeURIComponent(q)}`)}`,
      (q) => `https://corsproxy.io/?${encodeURIComponent(`https://html.duckduckgo.com/html/?q=${encodeURIComponent(q)}`)}`,
    ];
    
    for (const proxyFn of proxies) {
      try {
        const url = proxyFn(query);
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 10000);
        
        const response = await fetch(url, { signal: controller.signal });
        clearTimeout(timeout);
        
        if (!response.ok) continue;
        
        const html = await response.text();
        
        // Parse DuckDuckGo HTML results
        const results = [];
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        
        // Find result elements
        const resultElements = doc.querySelectorAll('.result__body, .results_links_deep');
        
        resultElements.forEach((el, i) => {
          if (i >= 5) return; // Max 5 results
          
          const titleEl = el.querySelector('.result__a, .result__title a');
          const snippetEl = el.querySelector('.result__snippet, .result__snippet_text');
          const linkEl = el.querySelector('.result__a, .result__url');
          
          if (titleEl && snippetEl) {
            results.push({
              title: titleEl.textContent?.trim() || '',
              snippet: snippetEl.textContent?.trim() || '',
              link: titleEl.href || linkEl?.href || ''
            });
          }
        });
        
        // Alternative parsing if above didn't work
        if (results.length === 0) {
          const links = doc.querySelectorAll('a.result__a');
          const snippets = doc.querySelectorAll('.result__snippet');
          
          links.forEach((link, i) => {
            if (i >= 5 || !snippets[i]) return;
            results.push({
              title: link.textContent?.trim() || '',
              snippet: snippets[i]?.textContent?.trim() || '',
              link: link.href || ''
            });
          });
        }
        
        if (results.length > 0) {
          return results;
        }
      } catch (error) {
        console.warn('DuckDuckGo search proxy failed:', error.message);
        continue;
      }
    }
    
    // If HTML parsing fails, try DuckDuckGo Instant Answer API (limited but no CORS)
    try {
      const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`);
      const data = await response.json();
      
      const results = [];
      
      // Abstract (main answer)
      if (data.Abstract) {
        results.push({
          title: data.Heading || query,
          snippet: data.Abstract,
          link: data.AbstractURL || ''
        });
      }
      
      // Related topics
      if (data.RelatedTopics) {
        data.RelatedTopics.slice(0, 4).forEach(topic => {
          if (topic.Text && topic.FirstURL) {
            results.push({
              title: topic.Text.split(' - ')[0] || '',
              snippet: topic.Text,
              link: topic.FirstURL
            });
          }
        });
      }
      
      return results.length > 0 ? results : null;
    } catch (error) {
      console.warn('DuckDuckGo API fallback failed:', error);
      return null;
    }
  };
  
  /**
   * Build search queries for a dataset
   */
  const buildSearchQueries = (dataset) => {
    const queries = [];
    const sourceUrl = dataset.metadata?.['Source URL'] || '';
    const fileName = dataset.name || '';
    const headers = dataset.data?.headers || [];
    
    // Extract domain from URL
    let domain = '';
    try {
      if (sourceUrl) {
        domain = new URL(sourceUrl).hostname.replace('www.', '');
      }
    } catch (e) {}
    
    // Query 1: Source + dataset name
    if (domain) {
      queries.push(`${domain} data license terms of use`);
    }
    
    // Query 2: File name context
    if (fileName) {
      const cleanName = fileName.replace(/\.(csv|xlsx|json|tsv)$/i, '').replace(/[_-]/g, ' ');
      queries.push(`${cleanName} dataset methodology documentation`);
    }
    
    // Query 3: Column-based query (use first few meaningful columns)
    const meaningfulCols = headers.filter(h => 
      h.length > 2 && 
      !['id', 'sr', 'no', 'sno', 'index'].includes(h.toLowerCase())
    ).slice(0, 3);
    
    if (meaningfulCols.length > 0) {
      queries.push(`${meaningfulCols.join(' ')} data source India`);
    }
    
    return queries.slice(0, 2); // Max 2 queries to stay within free limits
  };

  /**

  const callLLM = async (prompt) => {
    const { provider, apiKey, model } = state.settings;
    const providerConfig = state.settings.providers[provider];
    
    let endpoint, headers, body;
    
    switch (provider) {
      case 'anthropic':

        };
        body = {

        };

      case 'openai':

        headers = {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        };
        body = {
          model: model,

        };
        break;
      
      case 'openai_search':
        // OpenAI with web search uses the Responses API

        headers = { 'Content-Type': 'application/json' };
        body = {
          contents: [{ parts: [{ text: prompt }] }]
        };
        break;
        
      case 'mistral':
        endpoint = providerConfig.endpoint;
        headers = {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        };
        body = {
          model: model,
          messages: [{ role: 'user', content: prompt }]
        };
        break;
        
      case 'perplexity':
        endpoint = providerConfig.endpoint;
        headers = {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        };
        body = {
          model: model,
          messages: [

              content: 'You are a data cataloging expert. Search the web to find accurate metadata about datasets, including licensing, methodology, source agencies, and documentation. Always provide specific, factual information based on your web search results.' 
            },
            { role: 'user', content: prompt }
          ],
          web_search: true,
          return_citations: true
        };
        break;
      
      case 'custom':
        // Custom/Local model configuration
        const customConfig = providerConfig.customConfig;
        endpoint = customConfig.endpoint;
        
        // Build headers based on format
        headers = { 'Content-Type': 'application/json' };
        
        // Add API key if provided (optional for local models)
        if (apiKey) {
          if (customConfig.apiFormat === 'anthropic') {
            headers['x-api-key'] = apiKey;
            headers['anthropic-version'] = '2023-06-01';
          } else {
            headers['Authorization'] = `Bearer ${apiKey}`;
          }
        }
        
        // Build body based on format
        if (customConfig.apiFormat === 'anthropic') {
          body = {
            model: customConfig.modelName,
            max_tokens: customConfig.maxTokens || 4096,
            temperature: customConfig.temperature ?? 0.3,
            messages: [{ role: 'user', content: prompt }]
          };
        } else {
          // OpenAI-compatible format (default for most local servers)
          body = {
            model: customConfig.modelName,
            max_tokens: customConfig.maxTokens || 4096,
            temperature: customConfig.temperature ?? 0.3,
            messages: [{ role: 'user', content: prompt }]
          };
        }
        break;
        
      default:
        throw new Error(`Unknown provider: ${provider}`);
    }
    
    const response = await fetch(endpoint, {
      method: 'POST',
      headers,
      body: JSON.stringify(body)
    });
    
    if (!response.ok) {
      const error = await response.json().catch(() => ({}));
      throw new Error(error.error?.message || `API error: ${response.status}`);
    }
    
    const data = await response.json();
    
    // Extract response text based on provider
    switch (provider) {
      case 'anthropic':
        return data.content?.[0]?.text || '';
      case 'openai':
      case 'mistral':
      case 'perplexity':
        return data.choices?.[0]?.message?.content || '';
      case 'openai_search':
        // OpenAI Responses API returns output array with message items
        // Find the message item and extract text
        if (data.output) {
          for (const item of data.output) {
            if (item.type === 'message' && item.content) {
              for (const content of item.content) {
                if (content.type === 'output_text') {
                  return content.text || '';
                }
              }
            }
          }
        }
        // Fallback to output_text if present directly
        return data.output_text || '';
      case 'google':
        return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      case 'custom':
        // Handle both OpenAI and Anthropic compatible responses
        const customConfig = state.settings.providers.custom.customConfig;
        if (customConfig.apiFormat === 'anthropic') {
          return data.content?.[0]?.text || '';

          // OpenAI-compatible format (Ollama, LM Studio, vLLM, etc.)
          return data.choices?.[0]?.message?.content || '';
        }
      default:
        return '';
    }
  };

              ${formatNumber(dataset.data?.rows?.length || 0)} rows ·

              ${dataset.augmented ? ' · <span class="text-success">✓ Augmented</span>' : ''}
            </p>

          <div class="flex gap-2" style="flex-wrap: wrap;">

              ${state.augmenting ? '⏳ Augmenting...' : '🤖 Augment with AI'}

            </div>

        ` : ''}
        
        ${(() => {
          // Quality Summary Card
          if (!dataset.quality || Object.keys(dataset.quality).length === 0) return '';
          
          const scores = Object.values(dataset.quality).map(q => q.score).filter(s => typeof s === 'number');
          if (scores.length === 0) return '';
          
          const avgScore = (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1);
          const excellent = scores.filter(s => s >= 9).length;
          const good = scores.filter(s => s >= 7 && s < 9).length;

                const canInfer = field.aiInfer === true;
                const quality = dataset.quality?.[field.name];
                const hasScore = quality && typeof quality.score === 'number';
                const scoreColor = hasScore ? (quality.score >= 9 ? 'var(--color-accent-success)' : quality.score >= 7 ? 'var(--color-accent-success)' : quality.score >= 5 ? 'var(--color-accent-warning)' : 'var(--color-accent-danger)') : '';

                      <div style="display: flex; gap: 8px; flex-wrap: wrap;">

  /**
   * Render metadata input field based on type
   */
  const renderMetadataInput = (dataset, field) => {
    const value = dataset.metadata?.[field.name] || '';
    const id = `meta-${field.id}`;
    
    switch (field.type) {
      case 'longtext':
        return `<textarea id="${id}" 
                          rows="3" 
                          onchange="App.updateMetadata('${dataset.id}', '${field.name}', this.value)"
                >${value}</textarea>`;
      
      case 'enum':
        return `<select id="${id}" onchange="App.updateMetadata('${dataset.id}', '${field.name}', this.value)">
                  <option value="">Select...</option>
                  ${(field.options || []).map(opt => `
                    <option value="${opt}" ${value === opt ? 'selected' : ''}>${opt}</option>
                  `).join('')}
                </select>`;
      
      case 'tags':
        const tags = Array.isArray(value) ? value.join(', ') : value;
        return `<input type="text" 
                       id="${id}" 
                       value="${tags}" 
                       onchange="App.updateMetadata('${dataset.id}', '${field.name}', this.value.split(',').map(s=>s.trim()).filter(Boolean))"
                       placeholder="tag1, tag2, tag3">`;
      
      case 'boolean':
        return `<select id="${id}" onchange="App.updateMetadata('${dataset.id}', '${field.name}', this.value === 'true')">
                  <option value="">Select...</option>
                  <option value="true" ${value === true ? 'selected' : ''}>Yes</option>
                  <option value="false" ${value === false ? 'selected' : ''}>No</option>
                </select>`;
      
      case 'date':
        return `<input type="date" 
                       id="${id}" 
                       value="${value}" 
                       onchange="App.updateMetadata('${dataset.id}', '${field.name}', this.value)">`;
      
      case 'number':
        return `<input type="number" 
                       id="${id}" 
                       value="${value}" 
                       onchange="App.updateMetadata('${dataset.id}', '${field.name}', parseFloat(this.value))">`;
      
      case 'url':
        return `<input type="url" 
                       id="${id}" 
                       value="${value}" 
                       onchange="App.updateMetadata('${dataset.id}', '${field.name}', this.value)"
                       placeholder="https://...">`;
      
      default:
        return `<input type="text" 
                       id="${id}" 
                       value="${value}" 
                       onchange="App.updateMetadata('${dataset.id}', '${field.name}', this.value)">`;
    }
  };

      if (currentTheme === 'dark') {
        newTheme = 'light';
      } else if (currentTheme === 'light') {
        newTheme = 'dark';

        // No theme set, check system preference and toggle opposite
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    /**
     * Helper to make OpenMetadata API calls through proxy
     */
    omFetch: async (endpoint, options = {}) => {
      const { url, jwtToken } = state.settings.openMetadata;
      const targetUrl = `${url}${endpoint}`;
      const proxyUrl = `/proxy/${targetUrl}`;
      
      const headers = { ...options.headers };
      if (jwtToken) {
        headers['Authorization'] = `Bearer ${jwtToken}`;
      }
      if (options.body) {
        headers['Content-Type'] = 'application/json';
      }
      
      const response = await fetch(proxyUrl, {
        ...options,
        headers
      });
      
      return response;
    },
    
    /**
     * Ensure OpenMetadata service, database, and schema exist
     * First tries to use existing sample_data service, then creates custom if needed
     */
    ensureOpenMetadataStructure: async (serviceName, databaseName, schemaName) => {
      console.log('Creating OpenMetadata structure:', { serviceName, databaseName, schemaName });
      
      // Step 1: Try to create service (ignore 409 if exists)
      const servicePayload = {
        name: serviceName,
        serviceType: 'CustomDatabase',
        description: 'Dataset Metadata Augmenter - Cataloged research datasets',
        connection: {
          config: {
            type: 'CustomDatabase',
            sourcePythonClass: 'metadata.ingestion.source.database.customdatabase.metadata.CustomDatabaseSource',
            connectionOptions: {}
          }
        }
      };
      
      console.log('Creating service:', JSON.stringify(servicePayload, null, 2));
      const serviceResp = await App.omFetch('/api/v1/services/databaseServices', {
        method: 'POST',
        body: JSON.stringify(servicePayload)
      });
      
      const serviceRespText = await serviceResp.text();
      console.log('Service response:', serviceResp.status, serviceRespText);
      
      // Check for success or conflict (409 = already exists, which is OK)
      let serviceStatus = serviceResp.status;
      
      // Fallback: check if response body contains conflict info (proxy may return 500 with conflict in body)
      if (serviceStatus === 500 && serviceRespText.includes('409')) {
        console.log('Detected 409 conflict in response body, treating as success');
        serviceStatus = 409;
      }
      
      const serviceOk = serviceStatus >= 200 && serviceStatus < 300;
      const serviceConflict = serviceStatus === 409;
      
      if (!serviceOk && !serviceConflict) {
        let errMsg = `HTTP ${serviceStatus}`;
        try {
          const err = JSON.parse(serviceRespText);
          errMsg = err.message || err.error || errMsg;
        } catch (e) {
          errMsg = serviceRespText || errMsg;
        }
        throw new Error(`Service creation failed: ${errMsg}`);
      }
      console.log('Service ready', serviceConflict ? '(already exists)' : '(created)');
      
      // Step 2: Create database (ignore 409 if exists)
      const dbPayload = {
        name: databaseName,
        service: serviceName,
        description: 'Datasets cataloged via Dataset Metadata Augmenter'
      };
      
      console.log('Creating database:', JSON.stringify(dbPayload, null, 2));
      const dbResp = await App.omFetch('/api/v1/databases', {
        method: 'POST',
        body: JSON.stringify(dbPayload)
      });
      
      const dbRespText = await dbResp.text();
      console.log('Database response:', dbResp.status, dbRespText);
      
      // Check for success or conflict
      let dbStatus = dbResp.status;
      if (dbStatus === 500 && dbRespText.includes('409')) {
        console.log('Detected 409 conflict in response body, treating as success');
        dbStatus = 409;
      }
      
      const dbOk = dbStatus >= 200 && dbStatus < 300;
      const dbConflict = dbStatus === 409;
      
      if (!dbOk && !dbConflict) {
        let errMsg = `HTTP ${dbStatus}`;
        try {
          const err = JSON.parse(dbRespText);
          errMsg = err.message || err.error || errMsg;
        } catch (e) {
          errMsg = dbRespText || errMsg;
        }
        throw new Error(`Database creation failed: ${errMsg}`);
      }
      console.log('Database ready', dbConflict ? '(already exists)' : '(created)');
      
      // Step 3: Create schema (ignore 409 if exists)
      const dbFqn = `${serviceName}.${databaseName}`;
      const schemaPayload = {
        name: schemaName,
        database: dbFqn,
        description: 'Default schema for cataloged datasets'
      };
      
      console.log('Creating schema:', JSON.stringify(schemaPayload, null, 2));
      const schemaResp = await App.omFetch('/api/v1/databaseSchemas', {
        method: 'POST',
        body: JSON.stringify(schemaPayload)
      });
      
      const schemaRespText = await schemaResp.text();
      console.log('Schema response:', schemaResp.status, schemaRespText);
      
      // Check for success or conflict
      let schemaStatus = schemaResp.status;
      if (schemaStatus === 500 && schemaRespText.includes('409')) {
        console.log('Detected 409 conflict in response body, treating as success');
        schemaStatus = 409;
      }
      
      const schemaOk = schemaStatus >= 200 && schemaStatus < 300;
      const schemaConflict = schemaStatus === 409;
      
      if (!schemaOk && !schemaConflict) {
        let errMsg = `HTTP ${schemaStatus}`;
        try {
          const err = JSON.parse(schemaRespText);
          errMsg = err.message || err.error || errMsg;
        } catch (e) {
          errMsg = schemaRespText || errMsg;
        }
        throw new Error(`Schema creation failed: ${errMsg}`);
      }
      console.log('Schema ready', schemaConflict ? '(already exists)' : '(created)');
      
      return `${serviceName}.${databaseName}.${schemaName}`;
    },
    
    /**

    /**
     * Push dataset to OpenMetadata
     */
    pushToOpenMetadata: async (datasetId) => {
      const dataset = state.datasets.find(d => d.id === datasetId);
      if (!dataset) return;
      
      const { url, jwtToken, serviceName, databaseName } = state.settings.openMetadata;
      
      if (!url) {
        showToast('Please configure OpenMetadata in Settings', 'error');
        return;
      }
      
      showToast('Pushing to OpenMetadata...', 'info');
      
      try {
        // Generate a clean table name from dataset name
        const tableName = dataset.name
          .replace(/\.[^.]+$/, '')  // Remove extension
          .replace(/[^a-zA-Z0-9_]/g, '_')  // Replace special chars
          .replace(/_+/g, '_')  // Collapse multiple underscores
          .replace(/^_|_$/g, '')  // Remove leading/trailing underscores
          .toLowerCase()
          .substring(0, 128);  // Max length
        
        const schemaName = 'default';
        
        // First ensure the service/database/schema structure exists
        const schemaFqn = await App.ensureOpenMetadataStructure(serviceName, databaseName, schemaName);
        console.log('Schema FQN:', schemaFqn);
        
        // Build rich description from all metadata fields
        const descriptionParts = [];
        
        // Add main description/abstract if available
        const mainDesc = dataset.metadata?.description || dataset.metadata?.abstract || 
                        dataset.metadata?.['Dataset Name'] || dataset.name;
        if (mainDesc) descriptionParts.push(mainDesc);
        
        // Add key metadata as markdown sections
        const metadataFields = [
          { key: 'authoring_entity', label: 'Authoring Entity' },
          { key: 'Source Agency', label: 'Source Agency' },
          { key: 'source_url', label: 'Source URL' },
          { key: 'Source URL', label: 'Source URL' },
          { key: 'geog_coverage', label: 'Geographic Coverage' },
          { key: 'Geographic Coverage', label: 'Geographic Coverage' },
          { key: 'time_periods', label: 'Time Period' },
          { key: 'Temporal Coverage', label: 'Temporal Coverage' },
          { key: 'universe', label: 'Universe' },
          { key: 'sampling_procedure', label: 'Sampling' },
          { key: 'access_policy', label: 'Access Policy' },
          { key: 'license', label: 'License' },
          { key: 'cit_req', label: 'Citation' }
        ];
        
        const metadataSection = metadataFields
          .filter(f => dataset.metadata?.[f.key])
          .map(f => `**${f.label}:** ${dataset.metadata[f.key]}`)
          .join('\n\n');
        
        if (metadataSection) {
          descriptionParts.push('\n---\n' + metadataSection);
        }
        
        const description = descriptionParts.join('\n\n') || `Dataset: ${dataset.name}`;
        
        // Build columns from dataset headers with stats
        const stats = computeStats(dataset.data);
        const columns = (dataset.data?.headers || []).map((colName, index) => {
          const colStats = stats?.columns?.[index];
          
          // Build column description with stats
          let colDescription = `Column: ${colName}`;
          if (colStats) {
            const statParts = [];
            statParts.push(`Fill rate: ${colStats.fillRate}%`);
            statParts.push(`Unique: ${colStats.uniqueCount}`);
            if (colStats.isNumeric) {
              statParts.push(`Range: ${colStats.min} - ${colStats.max}`);
            }
            if (colStats.sample) {
              statParts.push(`Sample: ${colStats.sample.slice(0, 3).join(', ')}`);
            }
            colDescription = statParts.join(' | ');
          }
          
          // Determine data type
          let dataType = 'STRING';
          if (colStats?.isNumeric) {
            dataType = colStats.hasDecimals ? 'DOUBLE' : 'BIGINT';
          } else if (colStats?.isDate) {
            dataType = 'DATE';
          }
          
          return {
            name: colName.replace(/[^a-zA-Z0-9_]/g, '_').substring(0, 128),
            displayName: colName,
            dataType: dataType,
            description: colDescription
          };
        });
        
        // Note: Tags require pre-existing classifications in OpenMetadata
        // Skip tags for now to avoid "tag instance not found" errors
        
        // Create table payload - databaseSchema must be the FQN string
        const tablePayload = {
          name: tableName,
          displayName: dataset.metadata?.title || dataset.metadata?.['Dataset Name'] || dataset.name,
          description: description,
          tableType: 'Regular',
          columns: columns.length > 0 ? columns : [{ name: 'data', dataType: 'STRING', description: 'Data column' }],
          databaseSchema: schemaFqn  // This is the FQN: service.database.schema
        };
        
        console.log('Creating table with payload:', JSON.stringify(tablePayload, null, 2));

    importSchema: (event) => {
      const file = event.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          if (Array.isArray(imported)) {
            // Check the format and convert if needed
            let convertedSchema;
            
            // Format 1: Already in correct format (has 'name' and 'type')
            if (imported[0] && imported[0].name && imported[0].type) {
              convertedSchema = imported;
            }
            // Format 2: Simple format with 'Field' and 'Description' (like Ashoka Datalake format)
            else if (imported[0] && (imported[0].Field || imported[0].field)) {
              convertedSchema = imported.map((item, index) => {
                const fieldName = item.Field || item.field || item.name || `Field ${index + 1}`;
                const description = item.Description || item.description || '';
                
                // Infer type from field name - keep it simple, mostly text
                let fieldType = 'text';
                const nameLower = fieldName.toLowerCase();
                
                if (nameLower.includes('url') || nameLower.includes('link')) {
                  fieldType = 'url';
                } else if (nameLower === 'last updated' || nameLower === 'date' || nameLower === 'last_updated') {
                  // Only exact matches for date type
                  fieldType = 'date';
                } else if (nameLower.includes('description') || nameLower.includes('notes') || nameLower.includes('variables') || nameLower.includes('indicators') || nameLower.includes('quality')) {
                  fieldType = 'longtext';
                } else if (nameLower.includes('tag') || nameLower.includes('keyword')) {
                  fieldType = 'tags';
                }
                // Note: NOT auto-detecting enum - let AI infer text values instead
                
                // Determine if required (title, source, publisher usually are)
                const isRequired = nameLower.includes('title') || nameLower.includes('publisher') || nameLower.includes('source');
                
                // AI should infer almost all fields (except URL which user provides)
                const aiInfer = !nameLower.includes('url') && !nameLower.includes('link');
                
                return {
                  id: String(index + 1),
                  name: fieldName,
                  type: fieldType,
                  required: isRequired,
                  aiInfer: aiInfer,
                  description: description
                };
              });
            }
            // Format 3: Just an array of field names (strings)
            else if (typeof imported[0] === 'string') {
              convertedSchema = imported.map((name, index) => ({
                id: String(index + 1),
                name: name,
                type: 'text',
                required: false,
                aiInfer: true
              }));
            }
            else {
              throw new Error('Unrecognized schema format');
            }
            
            state.schema = convertedSchema;
            saveState();
            showToast(`Schema imported successfully (${convertedSchema.length} fields)`, 'success');
            render();
          } else {
            throw new Error('Schema must be an array');
          }
        } catch (error) {
          console.error('Import error:', error);
          showToast('Failed to import schema: ' + error.message, 'error');
        }
      };
      reader.readAsText(file);
      // Reset input so same file can be imported again
      event.target.value = '';
    },

    /**
     * Regenerate a single field using judge feedback (or custom feedback)
     */
    regenerateWithFeedback: async (datasetId, fieldName, customFeedback = null) => {
      const dataset = state.datasets.find(d => d.id === datasetId);
      if (!dataset) return;
      
      const quality = dataset.quality?.[fieldName];
      if (!quality) {
        showToast('No feedback available for this field', 'error');
        return;
      }
      
      if ((quality.attempts || 1) >= 3) {
        showToast('Maximum regeneration attempts (3) reached', 'warning');
        return;
      }
      
      state.augmenting = true;
      state.augmentLog = [`♻️ Regenerating "${fieldName}" with feedback...`];
      render();
      
      try {
        // Use custom feedback if provided, otherwise use stored feedback
        const feedback = customFeedback || quality.feedback || 'Improve clarity and specificity';
        const improvedValue = await regenerateFieldWithFeedback(dataset, fieldName, feedback);
        
        if (improvedValue) {
          dataset.metadata[fieldName] = improvedValue;
          state.augmentLog.push(`✅ New value generated`);
          render();
          
          // Re-judge the improved field
          state.augmentLog.push(`⚖️ Re-judging quality...`);
          render();
          
          const newScores = await judgeMetadataQuality(dataset, [fieldName]);
          
          if (newScores[fieldName]) {
            dataset.quality[fieldName] = {
              score: newScores[fieldName].score,
              feedback: newScores[fieldName].feedback,
              attempts: (quality.attempts || 1) + 1,
              judgedAt: new Date().toISOString()
            };
            
            state.augmentLog.push(`📊 New score: ${newScores[fieldName].score}/10`);
          }
          
          saveState();
          showToast(`Field regenerated (${dataset.quality[fieldName]?.score || '?'}/10)`, 'success');
        } else {
          throw new Error('Failed to generate improved value');
        }
      } catch (error) {
        state.augmentLog.push(`❌ Error: ${error.message}`);
        showToast('Regeneration failed', 'error');
      }
      
      state.augmenting = false;
      if (state.currentDataset?.id === datasetId) {
        state.currentDataset = dataset;
      }
      render();
    },
    
    /**
     * Re-judge all fields (useful after manual edits)
     */
    rejudgeAllFields: async (datasetId) => {
      const dataset = state.datasets.find(d => d.id === datasetId);
      if (!dataset || !dataset.metadata) return;
      
      state.augmenting = true;
      state.augmentLog = ['⚖️ Re-judging all metadata fields...'];
      render();
      
      try {
        const qualityScores = await judgeMetadataQuality(dataset);
        
        // Update quality scores (preserve attempt counts)
        dataset.quality = dataset.quality || {};
        Object.entries(qualityScores).forEach(([fieldName, result]) => {
          const existing = dataset.quality[fieldName] || {};
          dataset.quality[fieldName] = {
            score: result.score,
            feedback: result.feedback,
            attempts: existing.attempts || 1,
            judgedAt: new Date().toISOString()
          };
        });
        
        const scores = Object.values(qualityScores).map(q => q.score).filter(s => typeof s === 'number');
        const avgScore = scores.length > 0 ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1) : 'N/A';
        
        state.augmentLog.push(`📊 Overall Quality: ${avgScore}/10`);
        saveState();
        showToast(`Quality re-assessed: ${avgScore}/10`, 'success');
        
      } catch (error) {
        state.augmentLog.push(`❌ Error: ${error.message}`);
        showToast('Judging failed', 'error');
      }
      
      state.augmenting = false;
      if (state.currentDataset?.id === datasetId) {
        state.currentDataset = dataset;
      }
      render();

        value = value.replace(/^(Value:|Answer:|Result:)\s*/i, ''); // Remove prefixes
        
        // Check if AI still couldn't determine (be more lenient)
        const invalidResponses = ['unknown', 'null', 'n/a', 'not available', 'not found', 'none', 'undefined'];
        if (!value || invalidResponses.includes(value.toLowerCase())) {
          showToast(`Could not infer "${field.name}" - try adding more context`, 'warning');
        } else {
          // Parse based on field type
          if (field.type === 'tags') {
            value = value.split(',').map(s => s.trim()).filter(Boolean);
          } else if (field.type === 'boolean') {
            value = value.toLowerCase() === 'yes' || value.toLowerCase() === 'true';
          } else if (field.type === 'number') {
            value = parseFloat(value) || value;
          }
          
          dataset.metadata = dataset.metadata || {};
          dataset.metadata[field.name] = value;
          saveState();
          showToast(`"${field.name}" filled!`, 'success');
        }
        
      } catch (error) {
        showToast(`Failed to infer: ${error.message}`, 'error');
      }
      
      state.inferringField = null;
      if (state.currentDataset?.id === datasetId) {
        state.currentDataset = dataset;
      }
      render();
    },
    
    augmentEmptyFields: async (datasetId) => {
      const dataset = state.datasets.find(d => d.id === datasetId);
      if (!dataset) return;
      
      if (!state.settings.apiKey) {
        showToast('Please configure your API key in Settings', 'error');
        return;
      }
      
      // Find empty AI-inferable fields
      const emptyFields = state.schema.filter(f => {
        if (!f.aiInfer) return false;
        const val = dataset.metadata?.[f.name];
        return !val || (Array.isArray(val) && val.length === 0);
      });
      
      if (emptyFields.length === 0) {
        showToast('All fields are already filled!', 'success');
        return;
      }
      
      state.augmenting = true;
      state.augmentLog = [`🚀 Filling ${emptyFields.length} empty fields...`];
      render();
      
      try {
        const sampleRows = dataset.data ? dataset.data.rows.slice(0, 10) : [];
        const sourceUrl = dataset.metadata?.['Source URL'] || '';
        const fetchedContent = dataset.fetchedContent;
        
        const prompt = `You are a data cataloger with expertise in documenting datasets from various sources worldwide.

## Dataset Information

**File name:** ${dataset.name}

**Columns (${dataset.data?.headers?.length || 0}):**
${dataset.data?.headers?.join(', ') || 'Unknown'}

**Sample data (first ${sampleRows.length} rows):**
${sampleRows.map((r, i) => `Row ${i + 1}: ${r.slice(0, 10).join(' | ')}${r.length > 10 ? ' ...' : ''}`).join('\n')}

${sourceUrl ? `**Source URL:** ${sourceUrl}` : ''}

${fetchedContent ? `
## Source Page Information (fetched from URL)

**Page Title:** ${fetchedContent.title || 'Not found'}
**Description:** ${fetchedContent.description || 'Not found'}
**Agency/Publisher:** ${fetchedContent.agency || 'Not found'}
${fetchedContent.keywords?.length ? `**Keywords:** ${fetchedContent.keywords.join(', ')}` : ''}
${fetchedContent.license ? `**License mentioned:** ${fetchedContent.license}` : ''}

**Page Content Extract:**
${fetchedContent.pageText?.slice(0, 2000) || 'Not available'}
` : ''}

## Already Filled Metadata
${Object.entries(dataset.metadata || {}).filter(([k, v]) => v && (!Array.isArray(v) || v.length > 0)).map(([k, v]) => `**${k}:** ${Array.isArray(v) ? v.join(', ') : v}`).join('\n') || 'None'}

## Task

Fill these empty fields using all available context:

${emptyFields.map(f => {
  if (f.type === 'tags') return `"${f.name}": ["tag1", "tag2", "tag3"]`;
  if (f.type === 'enum') return `"${f.name}": "one of: ${(f.options || []).join(', ')}"`;
  if (f.type === 'boolean') return `"${f.name}": true or false`;
  return `"${f.name}": "inferred value"`;
}).join(',\n')}

RULES:
- Provide a value for EVERY field. Never use null or empty values.
- Use clues from URL, page content, column names, data samples, and already filled metadata.
- Apply your knowledge of common data sources, licensing, and documentation standards.
- Return ONLY valid JSON object with these exact keys.`;

        state.augmentLog.push(`🤖 Calling ${state.settings.providers[state.settings.provider].name} API...`);
        render();
        
        const responseText = await callLLM(prompt);
        
        state.augmentLog.push('🔍 Parsing response...');
        render();
        
        const jsonMatch = responseText.match(/\{[\s\S]*\}/);
        if (!jsonMatch) {
          throw new Error('Could not parse LLM response as JSON');
        }
        
        const parsed = JSON.parse(jsonMatch[0]);
        
        // Merge inferred metadata
        dataset.metadata = dataset.metadata || {};
        let filledCount = 0;
        Object.entries(parsed).forEach(([key, value]) => {
          if (value !== null && value !== 'null' && value !== '' && value !== 'UNKNOWN') {
            dataset.metadata[key] = value;
            filledCount++;
          }
        });
        
        dataset.augmented = true;
        dataset.augmentedAt = new Date().toISOString();
        
        state.augmentLog.push(`✅ Filled ${filledCount} fields!`);
        showToast(`Filled ${filledCount} empty fields!`, 'success');
        saveState();
        
      } catch (error) {
        state.augmentLog.push(`❌ Error: ${error.message}`);
        showToast(`Augmentation failed: ${error.message}`, 'error');
      }
      
      state.augmenting = false;
      if (state.currentDataset?.id === datasetId) {
        state.currentDataset = dataset;
      }
      render();
    },
    
    exportDataset: (id) => {
      const dataset = state.datasets.find(d => d.id === id);
      if (!dataset) return;
      
      const exportData = {
        name: dataset.name,
        metadata: dataset.metadata,
        schema: state.schema,
        stats: computeStats(dataset.data),
        augmented: dataset.augmented,
        exportedAt: new Date().toISOString()
      };
      
      const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${dataset.name.replace(/\.[^.]+$/, '')}-metadata.json`;
      a.click();
    },
    
    exportFullDataset: (id) => {
      const dataset = state.datasets.find(d => d.id === id);
      if (!dataset) return;
      
      const exportData = {
        name: dataset.name,
        metadata: dataset.metadata,
        schema: state.schema,
        data: dataset.data,
        stats: computeStats(dataset.data),
        augmented: dataset.augmented,
        createdAt: dataset.createdAt,
        exportedAt: new Date().toISOString()
      };
      
      const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${dataset.name.replace(/\.[^.]+$/, '')}-full.json`;
      a.click();
    },
    
    exportMetadataCSV: (id) => {
      const dataset = state.datasets.find(d => d.id === id);
      if (!dataset) return;
      
      // Build CSV rows: Field, Value
      const rows = [['Field', 'Value']];
      state.schema.forEach(field => {
        let value = dataset.metadata?.[field.name] || '';
        // Handle arrays (tags)
        if (Array.isArray(value)) {
          value = value.join('; ');
        }
        // Escape quotes and wrap in quotes if contains comma
        value = String(value).replace(/"/g, '""');
        if (value.includes(',') || value.includes('\n') || value.includes('"')) {
          value = `"${value}"`;
        }
        rows.push([field.name, value]);
      });
      
      // Add dataset info
      rows.push(['---', '---']);
      rows.push(['Dataset Name', dataset.name]);
      rows.push(['Row Count', dataset.data?.rows?.length || 0]);
      rows.push(['Column Count', dataset.data?.headers?.length || 0]);
      rows.push(['Augmented', dataset.augmented ? 'Yes' : 'No']);
      rows.push(['Exported At', new Date().toISOString()]);
      
      const csvContent = rows.map(row => row.join(',')).join('\n');
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${dataset.name.replace(/\.[^.]+$/, '')}-metadata.csv`;
      a.click();
      showToast('Exported as CSV', 'success');
    },
    
    exportMetadataExcel: (id) => {
      const dataset = state.datasets.find(d => d.id === id);
      if (!dataset) return;
      
      // Build data for Excel
      const wsData = [['Field', 'Value', 'Type', 'Required']];
      state.schema.forEach(field => {
        let value = dataset.metadata?.[field.name] || '';
        if (Array.isArray(value)) {
          value = value.join('; ');
        }
        wsData.push([field.name, value, field.type, field.required ? 'Yes' : 'No']);
      });
      
      // Add blank row and dataset info
      wsData.push([]);
      wsData.push(['Dataset Info', '', '', '']);
      wsData.push(['Dataset Name', dataset.name, '', '']);
      wsData.push(['Row Count', dataset.data?.rows?.length || 0, '', '']);
      wsData.push(['Column Count', dataset.data?.headers?.length || 0, '', '']);
      wsData.push(['Columns', (dataset.data?.headers || []).join(', '), '', '']);
      wsData.push(['Augmented', dataset.augmented ? 'Yes' : 'No', '', '']);
      wsData.push(['Exported At', new Date().toISOString(), '', '']);
      
      // Create workbook
      const ws = XLSX.utils.aoa_to_sheet(wsData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Metadata');
      
      // Auto-size columns
      ws['!cols'] = [{ wch: 25 }, { wch: 60 }, { wch: 12 }, { wch: 10 }];
      
      // Export
      XLSX.writeFile(wb, `${dataset.name.replace(/\.[^.]+$/, '')}-metadata.xlsx`);
      showToast('Exported as Excel', 'success');
    },
    
    exportAllMetadataCSV: () => {
      if (state.datasets.length === 0) {
        showToast('No datasets to export', 'error');
        return;
      }
      
      // Build header row from schema
      const headers = ['Dataset Name', ...state.schema.map(f => f.name), 'Row Count', 'Columns', 'Augmented'];
      const rows = [headers];
      
      state.datasets.forEach(dataset => {
        const row = [dataset.name];
        state.schema.forEach(field => {
          let value = dataset.metadata?.[field.name] || '';
          if (Array.isArray(value)) value = value.join('; ');
          value = String(value).replace(/"/g, '""');
          if (value.includes(',') || value.includes('\n') || value.includes('"')) {
            value = `"${value}"`;
          }
          row.push(value);
        });
        row.push(dataset.data?.rows?.length || 0);
        row.push(dataset.data?.headers?.length || 0);
        row.push(dataset.augmented ? 'Yes' : 'No');
        rows.push(row);
      });
      
      const csvContent = rows.map(row => row.join(',')).join('\n');
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `all-datasets-metadata-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      showToast(`Exported ${state.datasets.length} datasets as CSV`, 'success');
    },
    
    exportAllMetadataExcel: () => {
      if (state.datasets.length === 0) {
        showToast('No datasets to export', 'error');
        return;
      }
      
      // Build header row from schema
      const headers = ['Dataset Name', ...state.schema.map(f => f.name), 'Row Count', 'Columns', 'Augmented'];
      const wsData = [headers];
      
      state.datasets.forEach(dataset => {
        const row = [dataset.name];
        state.schema.forEach(field => {
          let value = dataset.metadata?.[field.name] || '';
          if (Array.isArray(value)) value = value.join('; ');
          row.push(value);
        });
        row.push(dataset.data?.rows?.length || 0);
        row.push(dataset.data?.headers?.length || 0);
        row.push(dataset.augmented ? 'Yes' : 'No');
        wsData.push(row);
      });
      
      const ws = XLSX.utils.aoa_to_sheet(wsData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'All Datasets');
      
      // Auto-size first column
      ws['!cols'] = [{ wch: 30 }, ...state.schema.map(() => ({ wch: 25 })), { wch: 10 }, { wch: 10 }, { wch: 10 }];
      
      XLSX.writeFile(wb, `all-datasets-metadata-${new Date().toISOString().slice(0,10)}.xlsx`);
      showToast(`Exported ${state.datasets.length} datasets as Excel`, 'success');
    }
  };
})();

// Initialize app when DOM is ready
document.addEventListener("DOMContentLoaded", App.init);
  </script>
</body>
</html>
