<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dataset Metadata Augmenter</title>
  <meta name="description" content="AI-powered metadata augmentation for research datasets from government and open data platforms">
  <meta name="author" content="Aakash">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  
  <style>
    /* ============================================
       CSS VARIABLES & THEME
       ============================================ */
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f7f7f5;
      --color-background-tertiary: #efefec;
      --color-background-info: #e6f1fb;
      --color-background-success: #eaf3de;
      --color-background-warning: #faeeda;
      --color-background-danger: #fcebeb;
      
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #666666;
      --color-text-tertiary: #999999;
      --color-text-info: #185fa5;
      --color-text-success: #3b6d11;
      --color-text-warning: #854f0b;
      --color-text-danger: #a32d2d;
      
      --color-border-primary: rgba(0, 0, 0, 0.4);
      --color-border-secondary: rgba(0, 0, 0, 0.3);
      --color-border-tertiary: rgba(0, 0, 0, 0.15);
      
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      --font-mono: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      
      --border-radius-sm: 4px;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07);
    }
    
    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #1a1a1a;
        --color-background-secondary: #252525;
        --color-background-tertiary: #303030;
        --color-background-info: #0c447c;
        --color-background-success: #27500a;
        --color-background-warning: #633806;
        --color-background-danger: #791f1f;
        
        --color-text-primary: #f0f0f0;
        --color-text-secondary: #a0a0a0;
        --color-text-tertiary: #707070;
        --color-text-info: #85b7eb;
        --color-text-success: #c0dd97;
        --color-text-warning: #fac775;
        --color-text-danger: #f09595;
        
        --color-border-primary: rgba(255, 255, 255, 0.4);
        --color-border-secondary: rgba(255, 255, 255, 0.3);
        --color-border-tertiary: rgba(255, 255, 255, 0.15);
      }
    }
    
    /* ============================================
       RESET & BASE STYLES
       ============================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    body {
      font-family: var(--font-sans);
      background: var(--color-background-tertiary);
      color: var(--color-text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }
    
    /* ============================================
       LAYOUT
       ============================================ */
    .app-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }
    
    .app-header {
      margin-bottom: 2rem;
    }
    
    .app-header h1 {
      font-size: 1.75rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 0.5rem;
    }
    
    .app-header p {
      color: var(--color-text-secondary);
      font-size: 0.95rem;
    }
    
    /* ============================================
       NAVIGATION
       ============================================ */
    .nav-tabs {
      display: flex;
      gap: 8px;
      padding: 1rem 0;
      border-bottom: 1px solid var(--color-border-tertiary);
      margin-bottom: 2rem;
    }
    
    .nav-tab {
      padding: 10px 20px;
      border: none;
      background: transparent;
      color: var(--color-text-secondary);
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      border-radius: var(--border-radius-md);
      transition: all 0.2s ease;
    }
    
    .nav-tab:hover {
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
    }
    
    .nav-tab.active {
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      font-weight: 500;
    }
    
    /* ============================================
       CARDS & CONTAINERS
       ============================================ */
    .card {
      background: var(--color-background-primary);
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      padding: 1.5rem;
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    
    .card-title {
      font-size: 1.1rem;
      font-weight: 500;
    }
    
    .metric-card {
      background: var(--color-background-secondary);
      border-radius: var(--border-radius-md);
      padding: 1rem 1.25rem;
    }
    
    .metric-label {
      font-size: 0.8rem;
      color: var(--color-text-secondary);
      margin-bottom: 4px;
    }
    
    .metric-value {
      font-size: 1.5rem;
      font-weight: 600;
    }
    
    /* ============================================
       FORM ELEMENTS
       ============================================ */
    input, select, textarea {
      font-family: inherit;
      font-size: 0.95rem;
      padding: 10px 14px;
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      width: 100%;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--color-border-secondary);
      box-shadow: 0 0 0 3px var(--color-background-info);
    }
    
    input[type="checkbox"] {
      width: auto;
      cursor: pointer;
    }
    
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    
    label {
      display: block;
      font-size: 0.85rem;
      color: var(--color-text-secondary);
      margin-bottom: 6px;
    }
    
    .form-group {
      margin-bottom: 1.25rem;
    }
    
    /* ============================================
       BUTTONS
       ============================================ */
    button, .btn {
      font-family: inherit;
      font-size: 0.9rem;
      padding: 10px 18px;
      border: 1px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      background: transparent;
      color: var(--color-text-primary);
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    button:hover, .btn:hover {
      background: var(--color-background-secondary);
    }
    
    button:active, .btn:active {
      transform: scale(0.98);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .btn-primary {
      background: var(--color-background-info);
      color: var(--color-text-info);
      border-color: transparent;
    }
    
    .btn-primary:hover {
      filter: brightness(0.95);
    }
    
    .btn-danger {
      color: var(--color-text-danger);
    }
    
    .btn-sm {
      padding: 6px 12px;
      font-size: 0.8rem;
    }
    
    /* ============================================
       TABLES
       ============================================ */
    .table-container {
      overflow-x: auto;
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    
    th, td {
      padding: 12px 16px;
      text-align: left;
    }
    
    th {
      background: var(--color-background-secondary);
      font-weight: 500;
      white-space: nowrap;
    }
    
    tr:not(:last-child) td {
      border-bottom: 1px solid var(--color-border-tertiary);
    }
    
    /* ============================================
       BADGES & TAGS
       ============================================ */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      font-size: 0.75rem;
      font-weight: 500;
      border-radius: var(--border-radius-sm);
    }
    
    .badge-info {
      background: var(--color-background-info);
      color: var(--color-text-info);
    }
    
    .badge-success {
      background: var(--color-background-success);
      color: var(--color-text-success);
    }
    
    .badge-warning {
      background: var(--color-background-warning);
      color: var(--color-text-warning);
    }
    
    .badge-danger {
      background: var(--color-background-danger);
      color: var(--color-text-danger);
    }
    
    /* ============================================
       GRID LAYOUTS
       ============================================ */
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }
    
    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }
    
    @media (max-width: 768px) {
      .grid-2 { grid-template-columns: 1fr; }
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
    }
    
    /* ============================================
       UPLOAD AREA
       ============================================ */
    .upload-area {
      border: 2px dashed var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      padding: 3rem 2rem;
      text-align: center;
      background: var(--color-background-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .upload-area:hover {
      border-color: var(--color-border-secondary);
      background: var(--color-background-tertiary);
    }
    
    .upload-area input[type="file"] {
      display: none;
    }
    
    /* ============================================
       DATASET LIST
       ============================================ */
    .dataset-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      background: var(--color-background-primary);
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 0.75rem;
    }
    
    .dataset-item:hover {
      border-color: var(--color-border-secondary);
      box-shadow: var(--shadow-sm);
    }
    
    .dataset-info h3 {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 4px;
    }
    
    .dataset-meta {
      font-size: 0.85rem;
      color: var(--color-text-secondary);
    }
    
    /* ============================================
       TOAST NOTIFICATIONS
       ============================================ */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 14px 24px;
      border-radius: var(--border-radius-md);
      font-size: 0.9rem;
      font-weight: 500;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    .toast-info {
      background: var(--color-background-info);
      color: var(--color-text-info);
    }
    
    .toast-success {
      background: var(--color-background-success);
      color: var(--color-text-success);
    }
    
    .toast-warning {
      background: var(--color-background-warning);
      color: var(--color-text-warning);
    }
    
    .toast-error {
      background: var(--color-background-danger);
      color: var(--color-text-danger);
    }
    
    /* ============================================
       CHART CONTAINER
       ============================================ */
    .chart-container {
      position: relative;
      height: 220px;
      margin-top: 1rem;
    }
    
    /* ============================================
       UTILITIES
       ============================================ */
    .text-muted { color: var(--color-text-secondary); }
    .text-success { color: var(--color-text-success); }
    .text-warning { color: var(--color-text-warning); }
    .text-danger { color: var(--color-text-danger); }
    .text-center { text-align: center; }
    .text-right { text-align: right; }
    .text-sm { font-size: 0.85rem; }
    .text-xs { font-size: 0.75rem; }
    .font-medium { font-weight: 500; }
    .mb-1 { margin-bottom: 0.5rem; }
    .mb-2 { margin-bottom: 1rem; }
    .mb-3 { margin-bottom: 1.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mt-3 { margin-top: 1.5rem; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 0.5rem; }
    .gap-3 { gap: 1rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>📚 Dataset Metadata Augmenter</h1>
      <p>AI-powered metadata enrichment for research datasets from government and open data platforms</p>
    </header>
    
    <div id="app">
      <!-- App renders here -->
    </div>
    
    <footer style="margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--color-border-tertiary); text-align: center;">
      <p style="font-size: 0.85rem; color: var(--color-text-secondary);">
        Built by <a href="https://www.linkedin.com/in/aakashsharma8a6888131/" target="_blank" rel="noopener" style="color: var(--color-text-info); text-decoration: none;">Aakash Sharma</a> · 
        <a href="https://github.com/aakashsharma8a6888131/Dataset-Metadata-Augmenter" target="_blank" rel="noopener" style="color: var(--color-text-secondary); text-decoration: none;">GitHub</a> · 
        MIT License
      </p>
    </footer>
  </div>
  
  <!-- Chart.js for statistics visualization -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  
  <!-- PapaParse for robust CSV parsing -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  
  <!-- SheetJS for Excel file support -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <script>
/**
 * ============================================
 * DATASET METADATA AUGMENTER
 * ============================================
 * A client-side application for cataloging and enriching
 * research datasets with AI-powered metadata extraction.
 * 
 * Author: Aakash Sharma (https://www.linkedin.com/in/aakashsharma8a6888131/)
 * License: MIT
 * Repository: https://github.com/aakashsharma8a6888131/Dataset-Metadata-Augmenter
 */

const App = (() => {
  // ============================================
  // STATE MANAGEMENT
  // ============================================
  
  /**
   * Application state - single source of truth
   * Persisted to localStorage for session continuity
   */
  let state = {
    view: 'datasets',           // Current view: 'datasets' | 'schema' | 'settings'
    
    // LLM Configuration
    settings: {
      provider: 'anthropic',
      apiKey: '',
      model: 'claude-sonnet-4-5-20250929',
      providers: {
        anthropic: { 
          name: 'Anthropic',
          models: [
            'claude-opus-4-5-20251101',
            'claude-sonnet-4-5-20250929',
            'claude-sonnet-4-6-20260217',
            'claude-opus-4-6-20260205',
            'claude-haiku-4-5-20251001'
          ],
          endpoint: 'https://api.anthropic.com/v1/messages'
        },
        openai: { 
          name: 'OpenAI',
          models: [
            'gpt-5.4',
            'gpt-5.4-mini',
            'gpt-5.4-nano',
            'gpt-4.1',
            'gpt-4.1-mini',
            'gpt-4o',
            'o4-mini'
          ],
          endpoint: 'https://api.openai.com/v1/chat/completions'
        },
        openai_search: { 
          name: 'OpenAI + Web Search',
          models: [
            'gpt-5.4',
            'gpt-4.1',
            'gpt-4o'
          ],
          endpoint: 'https://api.openai.com/v1/responses',
          webSearch: true
        },
        google: { 
          name: 'Google Gemini',
          models: [
            'gemini-3.1-pro-preview',
            'gemini-3-flash-preview',
            'gemini-2.5-pro',
            'gemini-2.5-flash',
            'gemini-2.5-flash-lite'
          ],
          endpoint: 'https://generativelanguage.googleapis.com/v1beta/models'
        },
        mistral: { 
          name: 'Mistral AI',
          models: [
            'mistral-large-latest',
            'mistral-medium-3-latest',
            'mistral-small-latest',
            'magistral-medium-latest',
            'magistral-small-latest',
            'codestral-latest'
          ],
          endpoint: 'https://api.mistral.ai/v1/chat/completions'
        },
        perplexity: { 
          name: 'Perplexity (Web Search)',
          models: [
            'sonar',
            'sonar-pro',
            'sonar-reasoning',
            'sonar-reasoning-pro'
          ],
          endpoint: 'https://api.perplexity.ai/chat/completions',
          webSearch: true
        },
        custom: {
          name: 'Custom / Local Model',
          models: [],  // User adds their own
          endpoint: '',  // User specifies
          isCustom: true,
          // Custom provider settings
          customConfig: {
            endpoint: 'http://localhost:11434/v1/chat/completions',  // Default to Ollama
            modelName: 'llama3',
            apiKey: '',  // Optional for local models
            apiFormat: 'openai',  // 'openai' or 'anthropic' compatible
            maxTokens: 4096,
            temperature: 0.3
          }
        }
      },
      // OpenMetadata Integration
      openMetadata: {
        url: 'http://localhost:8585',
        jwtToken: '',
        serviceName: 'dataset_augmenter',
        databaseName: 'default'
      },
      // DuckDuckGo Web Search (for web-enhanced metadata) - No API key needed!
      webSearch: {
        enabled: false
      }
    },
    
    // Custom Schemas Storage (user-created presets)
    customSchemas: {},  // { 'My Schema Name': [...fields], 'Another Schema': [...fields] }
    
    // Default Schema (user's preferred default)
    defaultSchema: null,  // If set, this loads instead of hardcoded default
    
    // Metadata Schema Definition
    schema: [
      { id: '1', name: 'Dataset Name', type: 'text', required: true, aiInfer: true },
      { id: '2', name: 'Source Agency', type: 'text', required: true, aiInfer: true },
      { id: '3', name: 'Source URL', type: 'url', required: true, aiInfer: false },
      { id: '4', name: 'Geographic Coverage', type: 'enum', options: ['National', 'State', 'District', 'Block', 'Village'], required: true, aiInfer: true },
      { id: '5', name: 'Temporal Coverage', type: 'text', required: false, aiInfer: true },
      { id: '6', name: 'Update Frequency', type: 'enum', options: ['Annual', 'Quarterly', 'Monthly', 'One-time', 'Irregular'], required: false, aiInfer: true },
      { id: '7', name: 'Methodology Notes', type: 'longtext', required: false, aiInfer: true },
      { id: '8', name: 'Variable Definitions', type: 'longtext', required: false, aiInfer: true },
      { id: '9', name: 'Data Quality Notes', type: 'longtext', required: false, aiInfer: true },
      { id: '10', name: 'License/Terms', type: 'text', required: false, aiInfer: true },
      { id: '11', name: 'Access Date', type: 'date', required: false, aiInfer: false },
      { id: '12', name: 'Tags', type: 'tags', required: false, aiInfer: true }
    ],
    
    // Dataset Storage
    datasets: [],
    currentDataset: null,
    uploadPreview: null,
    
    // Augmentation State
    augmenting: false,
    augmentLog: [],
    inferringField: null,  // Track which single field is being inferred
    
    // URL Fetching State
    fetchingUrl: false,
    
    // UI State
    toast: null
  };

  // ============================================
  // PERSISTENCE
  // ============================================
  
  const STORAGE_KEY = 'dataset-metadata-augmenter';
  
  /**
   * Save state to localStorage
   */
  const saveState = () => {
    try {
      const toSave = {
        settings: { ...state.settings, apiKey: '' }, // Never persist API key
        schema: state.schema,
        datasets: state.datasets,
        customSchemas: state.customSchemas,  // Save custom schemas
        defaultSchema: state.defaultSchema    // Save default schema
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
    } catch (e) {
      console.warn('Failed to save state:', e);
    }
  };
  
  /**
   * Load state from localStorage
   */
  const loadState = () => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed.settings) {
          state.settings = { ...state.settings, ...parsed.settings };
        }
        if (parsed.schema) {
          state.schema = parsed.schema;
        }
        if (parsed.datasets) {
          state.datasets = parsed.datasets;
        }
        // Load custom schemas
        if (parsed.customSchemas) {
          state.customSchemas = parsed.customSchemas;
        }
        // Load default schema
        if (parsed.defaultSchema) {
          state.defaultSchema = parsed.defaultSchema;
        }
      }
    } catch (e) {
      console.warn('Failed to load state:', e);
    }
  };

  // ============================================
  // UTILITIES
  // ============================================
  
  /**
   * Generate a unique ID
   */
  const generateId = () => Math.random().toString(36).substr(2, 9);
  
  /**
   * Show a toast notification
   */
  const showToast = (msg, type = 'info') => {
    state.toast = { msg, type };
    render();
    setTimeout(() => { 
      state.toast = null; 
      render(); 
    }, 3000);
  };
  
  /**
   * Format a number with locale-aware separators
   */
  const formatNumber = (num) => {
    return num.toLocaleString();
  };

  // ============================================
  // DATA PARSING
  // ============================================
  
  /**
   * Parse CSV text into headers and rows
   * Uses PapaParse for robust parsing
   */
  const parseCSV = (text) => {
    const result = Papa.parse(text, {
      header: false,
      skipEmptyLines: true,
      dynamicTyping: false
    });
    
    if (result.data.length === 0) {
      return { headers: [], rows: [] };
    }
    
    return {
      headers: result.data[0].map(h => String(h).trim()),
      rows: result.data.slice(1)
    };
  };
  
  /**
   * Parse Excel file using SheetJS
   */
  const parseExcel = (arrayBuffer) => {
    const workbook = XLSX.read(arrayBuffer, { type: 'array' });
    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
    const data = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });
    
    if (data.length === 0) {
      return { headers: [], rows: [] };
    }
    
    return {
      headers: data[0].map(h => String(h).trim()),
      rows: data.slice(1).map(row => row.map(cell => String(cell)))
    };
  };
  
  /**
   * Parse JSON array into tabular format
   */
  const parseJSON = (text) => {
    const json = JSON.parse(text);
    
    if (!Array.isArray(json) || json.length === 0) {
      throw new Error('JSON must be an array of objects');
    }
    
    const headers = Object.keys(json[0]);
    const rows = json.map(obj => headers.map(h => String(obj[h] ?? '')));
    
    return { headers, rows };
  };

  // ============================================
  // STATISTICS COMPUTATION
  // ============================================
  
  /**
   * Compute comprehensive statistics for a dataset
   * Scans FULL data for accurate metadata inference
   */
  const computeStats = (data) => {
    if (!data || !data.rows || data.rows.length === 0) {
      return null;
    }
    
    const stats = {
      rowCount: data.rows.length,
      colCount: data.headers.length,
      columns: [],
      // Summary fields for LLM context
      timeRange: null,       // { min: '2010', max: '2023' }
      geographicValues: [],  // All unique geographic values found
      allYears: [],          // All years found in data
      categorySummary: {}    // { columnName: [all unique values] }
    };
    
    // Patterns for detection
    const yearPattern = /^(19|20)\d{2}$/;
    const datePattern = /^\d{4}[-/]\d{2}[-/]\d{2}|^\d{2}[-/]\d{2}[-/]\d{4}/;
    const geoKeywords = ['state', 'district', 'country', 'region', 'city', 'village', 'block', 'location', 'place', 'area', 'zone', 'tehsil', 'taluk', 'mandal', 'province'];
    const yearKeywords = ['year', 'yr', 'date', 'period', 'time', 'fiscal', 'fy', 'ay'];
    
    const allYearsFound = new Set();
    const allGeoValues = new Set();
    
    data.headers.forEach((header, colIndex) => {
      const headerLower = header.toLowerCase();
      const values = data.rows.map(row => row[colIndex] || '');
      const nonEmpty = values.filter(v => v && String(v).trim());
      const unique = [...new Set(nonEmpty.map(v => String(v).trim()))];
      const numeric = nonEmpty.filter(v => !isNaN(parseFloat(v)));
      
      // Detect if column contains years
      const years = unique.filter(v => yearPattern.test(String(v).trim()));
      const isYearColumn = years.length > unique.length * 0.5 || 
                          yearKeywords.some(k => headerLower.includes(k));
      
      // Detect date patterns
      const dates = nonEmpty.filter(v => datePattern.test(String(v)));
      const isDateColumn = dates.length > nonEmpty.length * 0.5;
      
      // Detect geographic columns
      const isGeoColumn = geoKeywords.some(k => headerLower.includes(k));
      
      // Detect if it's a categorical column (low cardinality relative to rows)
      const isCategorical = unique.length <= 100 && unique.length < data.rows.length * 0.5;
      
      // Collect years from year columns
      if (isYearColumn) {
        years.forEach(y => allYearsFound.add(String(y).trim()));
      }
      
      // Extract years from date columns
      if (isDateColumn) {
        dates.forEach(d => {
          const match = String(d).match(/(19|20)\d{2}/);
          if (match) allYearsFound.add(match[0]);
        });
      }
      
      // Collect geographic values
      if (isGeoColumn) {
        unique.forEach(v => {
          if (v && v.length > 1 && v.length < 100) {
            allGeoValues.add(String(v).trim());
          }
        });
      }
      
      // Store category summary for categorical columns
      if (isCategorical && unique.length > 0) {
        stats.categorySummary[header] = unique;
      }
      
      // Compute numeric stats
      let min = null, max = null, hasDecimals = false;
      if (numeric.length > 0) {
        const numericValues = numeric.map(v => parseFloat(v));
        min = Math.min(...numericValues);
        max = Math.max(...numericValues);
        hasDecimals = numericValues.some(v => v % 1 !== 0);
      }
      
      stats.columns.push({
        name: header,
        fillRate: Math.round((nonEmpty.length / values.length) * 100),
        uniqueCount: unique.length,
        totalCount: values.length,
        isNumeric: numeric.length > nonEmpty.length * 0.8,
        isDate: isDateColumn,
        isYear: isYearColumn,
        isGeographic: isGeoColumn,
        isCategorical: isCategorical,
        hasDecimals: hasDecimals,
        sample: unique.slice(0, 5),
        allValues: isCategorical ? unique : null,  // Full list for categorical
        min: min,
        max: max
      });
    });
    
    // Compile time range from all years found
    const yearsArray = [...allYearsFound].map(y => parseInt(y)).filter(y => !isNaN(y)).sort((a, b) => a - b);
    if (yearsArray.length > 0) {
      stats.timeRange = {
        min: yearsArray[0],
        max: yearsArray[yearsArray.length - 1],
        years: yearsArray
      };
      stats.allYears = yearsArray;
    }
    
    // Compile geographic values
    stats.geographicValues = [...allGeoValues].sort();
    
    return stats;
  };

  /**
   * Fetch webpage content via CORS proxy with automatic fallback
   */
  const fetchUrlContent = async (url) => {
    let lastError = null;
    
    for (const proxy of CORS_PROXIES) {
      try {
        console.log(`Trying proxy: ${proxy.name}...`);
        const proxyUrl = proxy.buildUrl(url);
        
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000); // 10s timeout
        
        const response = await fetch(proxyUrl, { 
          signal: controller.signal,
          headers: {
            'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8'
          }
        });
        
        clearTimeout(timeoutId);
        
        const html = await proxy.parseResponse(response);
        
        // Validate we got actual HTML content
        if (!html || html.length < 100 || !html.includes('<')) {
          throw new Error('Invalid HTML response');
        }
        
        console.log(`Success with proxy: ${proxy.name}`);
        return html;
        
      } catch (error) {
        console.warn(`Proxy ${proxy.name} failed:`, error.message);
        lastError = error;
        // Continue to next proxy
      }
    }
    
    // All proxies failed
    throw new Error(`All proxies failed. Last error: ${lastError?.message || 'Unknown'}`);
  };
  
  /**
   * Extract metadata from HTML content
   */
  const extractMetadataFromHtml = (html, url) => {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    
    // Extract title
    let title = '';
    const titleEl = doc.querySelector('title');
    const ogTitle = doc.querySelector('meta[property="og:title"]');
    const h1 = doc.querySelector('h1');
    title = ogTitle?.content || titleEl?.textContent || h1?.textContent || '';
    title = title.trim();
    
    // Extract description
    let description = '';
    const metaDesc = doc.querySelector('meta[name="description"]');
    const ogDesc = doc.querySelector('meta[property="og:description"]');
    description = ogDesc?.content || metaDesc?.content || '';
    description = description.trim();
    
    // Try to extract agency/organization
    let agency = '';
    const ogSiteName = doc.querySelector('meta[property="og:site_name"]');
    const publisher = doc.querySelector('meta[name="publisher"]');
    const author = doc.querySelector('meta[name="author"]');
    agency = ogSiteName?.content || publisher?.content || author?.content || '';
    
    // Try to detect from common Indian gov sites
    if (!agency) {
      if (url.includes('ndap.niti.gov.in')) agency = 'National Data & Analytics Platform (NDAP), NITI Aayog';
      else if (url.includes('data.gov.in')) agency = 'Open Government Data Platform India';
      else if (url.includes('mospi.gov.in') || url.includes('mospi.nic.in')) agency = 'Ministry of Statistics and Programme Implementation';
      else if (url.includes('rbi.org.in')) agency = 'Reserve Bank of India';
      else if (url.includes('censusindia.gov.in')) agency = 'Office of the Registrar General & Census Commissioner, India';
      else if (url.includes('niti.gov.in')) agency = 'NITI Aayog';
      else if (url.includes('pib.gov.in')) agency = 'Press Information Bureau';
      else if (url.includes('epwrfits.in')) agency = 'EPW Research Foundation';
      else if (url.includes('indiastat.com')) agency = 'Indiastat';
      else if (url.includes('agricoop.nic.in')) agency = 'Ministry of Agriculture & Farmers Welfare';
      else if (url.includes('eands.dacnet.nic.in')) agency = 'Directorate of Economics & Statistics, Ministry of Agriculture';
      else if (url.includes('nhb.gov.in')) agency = 'National Horticulture Board';
      else if (url.includes('updes.up.nic.in') || url.includes('upag')) agency = 'Directorate of Economics & Statistics, Uttar Pradesh';
      else if (url.includes('.gov.in') || url.includes('.nic.in')) agency = 'Government of India';
    }
    agency = agency.trim();
    
    // Extract keywords/tags
    let keywords = [];
    const metaKeywords = doc.querySelector('meta[name="keywords"]');
    if (metaKeywords?.content) {
      keywords = metaKeywords.content.split(',').map(k => k.trim()).filter(Boolean).slice(0, 10);
    }
    
    // Extract any visible text for context (limit to reasonable size)
    let pageText = '';
    const mainContent = doc.querySelector('main, article, .content, #content, .main-content');
    if (mainContent) {
      pageText = mainContent.textContent || '';
    } else {
      pageText = doc.body?.textContent || '';
    }
    // Clean up and limit text
    pageText = pageText.replace(/\s+/g, ' ').trim().slice(0, 3000);
    
    // Look for license info
    let license = '';
    const licensePatterns = [
      /creative\s*commons/i,
      /cc[\s-]by/i,
      /open\s*data/i,
      /public\s*domain/i,
      /government\s*open\s*data\s*license/i
    ];
    for (const pattern of licensePatterns) {
      const match = pageText.match(pattern);
      if (match) {
        license = match[0];
        break;
      }
    }
    
    // Look for date/update info
    let lastUpdated = '';
    const datePatterns = [
      /(?:last\s*)?(?:updated|modified|published)[\s:]*(\d{1,2}[\s/-]\w+[\s/-]\d{4}|\d{4}[\s/-]\d{2}[\s/-]\d{2})/i,
      /(\d{1,2}[\s/-]\w+[\s/-]\d{4})/
    ];
    for (const pattern of datePatterns) {
      const match = pageText.match(pattern);
      if (match) {
        lastUpdated = match[1] || match[0];
        break;
      }
    }
    
    return {
      title,
      description,
      agency,
      keywords,
      license,
      lastUpdated,
      pageText,
      fetchedAt: new Date().toISOString()
    };
  };

  // ============================================
  // DUCKDUCKGO WEB SEARCH INTEGRATION
  // ============================================
  
  /**
   * Search the web using DuckDuckGo (via proxy to avoid CORS)
   * Returns top search results as context for the LLM
   * No API key needed!
   */
  const searchWeb = async (query) => {
    const { webSearch } = state.settings;
    
    if (!webSearch?.enabled) {
      return null;
    }
    
    // Try multiple CORS proxies
    const proxies = [
      (q) => `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://html.duckduckgo.com/html/?q=${encodeURIComponent(q)}`)}`,
      (q) => `https://corsproxy.io/?${encodeURIComponent(`https://html.duckduckgo.com/html/?q=${encodeURIComponent(q)}`)}`,
    ];
    
    for (const proxyFn of proxies) {
      try {
        const url = proxyFn(query);
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 10000);
        
        const response = await fetch(url, { signal: controller.signal });
        clearTimeout(timeout);
        
        if (!response.ok) continue;
        
        const html = await response.text();
        
        // Parse DuckDuckGo HTML results
        const results = [];
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        
        // Find result elements
        const resultElements = doc.querySelectorAll('.result__body, .results_links_deep');
        
        resultElements.forEach((el, i) => {
          if (i >= 5) return; // Max 5 results
          
          const titleEl = el.querySelector('.result__a, .result__title a');
          const snippetEl = el.querySelector('.result__snippet, .result__snippet_text');
          const linkEl = el.querySelector('.result__a, .result__url');
          
          if (titleEl && snippetEl) {
            results.push({
              title: titleEl.textContent?.trim() || '',
              snippet: snippetEl.textContent?.trim() || '',
              link: titleEl.href || linkEl?.href || ''
            });
          }
        });
        
        // Alternative parsing if above didn't work
        if (results.length === 0) {
          const links = doc.querySelectorAll('a.result__a');
          const snippets = doc.querySelectorAll('.result__snippet');
          
          links.forEach((link, i) => {
            if (i >= 5 || !snippets[i]) return;
            results.push({
              title: link.textContent?.trim() || '',
              snippet: snippets[i]?.textContent?.trim() || '',
              link: link.href || ''
            });
          });
        }
        
        if (results.length > 0) {
          return results;
        }
      } catch (error) {
        console.warn('DuckDuckGo search proxy failed:', error.message);
        continue;
      }
    }
    
    // If HTML parsing fails, try DuckDuckGo Instant Answer API (limited but no CORS)
    try {
      const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`);
      const data = await response.json();
      
      const results = [];
      
      // Abstract (main answer)
      if (data.Abstract) {
        results.push({
          title: data.Heading || query,
          snippet: data.Abstract,
          link: data.AbstractURL || ''
        });
      }
      
      // Related topics
      if (data.RelatedTopics) {
        data.RelatedTopics.slice(0, 4).forEach(topic => {
          if (topic.Text && topic.FirstURL) {
            results.push({
              title: topic.Text.split(' - ')[0] || '',
              snippet: topic.Text,
              link: topic.FirstURL
            });
          }
        });
      }
      
      return results.length > 0 ? results : null;
    } catch (error) {
      console.warn('DuckDuckGo API fallback failed:', error);
      return null;
    }
  };
  
  /**
   * Build search queries for a dataset
   */
  const buildSearchQueries = (dataset) => {
    const queries = [];
    const sourceUrl = dataset.metadata?.['Source URL'] || '';
    const fileName = dataset.name || '';
    const headers = dataset.data?.headers || [];
    
    // Extract domain from URL
    let domain = '';
    try {
      if (sourceUrl) {
        domain = new URL(sourceUrl).hostname.replace('www.', '');
      }
    } catch (e) {}
    
    // Query 1: Source + dataset name
    if (domain) {
      queries.push(`${domain} data license terms of use`);
    }
    
    // Query 2: File name context
    if (fileName) {
      const cleanName = fileName.replace(/\.(csv|xlsx|json|tsv)$/i, '').replace(/[_-]/g, ' ');
      queries.push(`${cleanName} dataset methodology documentation`);
    }
    
    // Query 3: Column-based query (use first few meaningful columns)
    const meaningfulCols = headers.filter(h => 
      h.length > 2 && 
      !['id', 'sr', 'no', 'sno', 'index'].includes(h.toLowerCase())
    ).slice(0, 3);
    
    if (meaningfulCols.length > 0) {
      queries.push(`${meaningfulCols.join(' ')} data source India`);
    }
    
    return queries.slice(0, 2); // Max 2 queries to stay within free limits
  };

  // ============================================
  // LLM INTEGRATION
  // ============================================
  
  /**
   * Call the configured LLM API
   */
  const callLLM = async (prompt) => {
    const { provider, apiKey, model } = state.settings;
    const providerConfig = state.settings.providers[provider];
    
    let endpoint, headers, body;
    
    switch (provider) {
      case 'anthropic':
        endpoint = providerConfig.endpoint;
        headers = {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01'
        };
        body = {
          model: model,
          max_tokens: 4000,
          messages: [{ role: 'user', content: prompt }]
        };
        break;
        
      case 'openai':
        endpoint = providerConfig.endpoint;
        headers = {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        };
        body = {
          model: model,
          messages: [{ role: 'user', content: prompt }]
        };
        break;
      
      case 'openai_search':
        // OpenAI with web search uses the Responses API
        endpoint = 'https://api.openai.com/v1/responses';
        headers = {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        };
        body = {
          model: model,
          input: prompt,
          tools: [{ 
            type: 'web_search',
            search_context_size: 'medium'
          }]
        };
        break;
        
      case 'google':
        endpoint = `${providerConfig.endpoint}/${model}:generateContent?key=${apiKey}`;
        headers = { 'Content-Type': 'application/json' };
        body = {
          contents: [{ parts: [{ text: prompt }] }]
        };
        break;
        
      case 'mistral':
        endpoint = providerConfig.endpoint;
        headers = {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        };
        body = {
          model: model,
          messages: [{ role: 'user', content: prompt }]
        };
        break;
        
      case 'perplexity':
        endpoint = providerConfig.endpoint;
        headers = {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        };
        body = {
          model: model,
          messages: [
            { 
              role: 'system', 
              content: 'You are a data cataloging expert. Search the web to find accurate metadata about datasets, including licensing, methodology, source agencies, and documentation. Always provide specific, factual information based on your web search results.' 
            },
            { role: 'user', content: prompt }
          ],
          web_search: true,
          return_citations: true
        };
        break;
      
      case 'custom':
        // Custom/Local model configuration
        const customConfig = providerConfig.customConfig;
        endpoint = customConfig.endpoint;
        
        // Build headers based on format
        headers = { 'Content-Type': 'application/json' };
        
        // Add API key if provided (optional for local models)
        if (apiKey) {
          if (customConfig.apiFormat === 'anthropic') {
            headers['x-api-key'] = apiKey;
            headers['anthropic-version'] = '2023-06-01';
          } else {
            headers['Authorization'] = `Bearer ${apiKey}`;
          }
        }
        
        // Build body based on format
        if (customConfig.apiFormat === 'anthropic') {
          body = {
            model: customConfig.modelName,
            max_tokens: customConfig.maxTokens || 4096,
            temperature: customConfig.temperature ?? 0.3,
            messages: [{ role: 'user', content: prompt }]
          };
        } else {
          // OpenAI-compatible format (default for most local servers)
          body = {
            model: customConfig.modelName,
            max_tokens: customConfig.maxTokens || 4096,
            temperature: customConfig.temperature ?? 0.3,
            messages: [{ role: 'user', content: prompt }]
          };
        }
        break;
        
      default:
        throw new Error(`Unknown provider: ${provider}`);
    }
    
    const response = await fetch(endpoint, {
      method: 'POST',
      headers,
      body: JSON.stringify(body)
    });
    
    if (!response.ok) {
      const error = await response.json().catch(() => ({}));
      throw new Error(error.error?.message || `API error: ${response.status}`);
    }
    
    const data = await response.json();
    
    // Extract response text based on provider
    switch (provider) {
      case 'anthropic':
        return data.content?.[0]?.text || '';
      case 'openai':
      case 'mistral':
      case 'perplexity':
        return data.choices?.[0]?.message?.content || '';
      case 'openai_search':
        // OpenAI Responses API returns output array with message items
        // Find the message item and extract text
        if (data.output) {
          for (const item of data.output) {
            if (item.type === 'message' && item.content) {
              for (const content of item.content) {
                if (content.type === 'output_text') {
                  return content.text || '';
                }
              }
            }
          }
        }
        // Fallback to output_text if present directly
        return data.output_text || '';
      case 'google':
        return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      case 'custom':
        // Handle both OpenAI and Anthropic compatible responses
        const customConfig = state.settings.providers.custom.customConfig;
        if (customConfig.apiFormat === 'anthropic') {
          return data.content?.[0]?.text || '';
        } else {
          // OpenAI-compatible format (Ollama, LM Studio, vLLM, etc.)
          return data.choices?.[0]?.message?.content || '';
        }
      default:
        return '';
    }
  };
  
  /**

      let statsSection = '';

        if (stats.timeRange) {

      </div>

  };
  
  /**
   * Render dataset detail view
   */
  const renderDatasetDetail = () => {
    const dataset = state.currentDataset;
    const stats = computeStats(dataset.data);
    
    return `
      <div>
        <button onclick="App.closeDataset()" class="mb-2">← Back to Datasets</button>
        
        <div class="flex justify-between items-center mb-3" style="flex-wrap: wrap; gap: 1rem;">
          <div>
            <h2 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 4px;">${dataset.name}</h2>
            <p class="text-muted">
              ${formatNumber(dataset.data?.rows?.length || 0)} rows · 
              ${dataset.data?.headers?.length || 0} columns
              ${dataset.augmented ? ' · <span class="text-success">✓ Augmented</span>' : ''}
            </p>
          </div>
          <div class="flex gap-2" style="flex-wrap: wrap;">
            <button onclick="App.augment('${dataset.id}')" ${state.augmenting ? 'disabled' : ''}>
              ${state.augmenting ? '⏳ Augmenting...' : '🤖 Augment with AI'}
            </button>
            <div style="position: relative; display: inline-block;">
              <button onclick="this.nextElementSibling.classList.toggle('hidden')">
                📥 Export ▾
              </button>
              <div class="hidden" style="position: absolute; top: 100%; right: 0; margin-top: 4px; background: var(--color-background-primary); border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); box-shadow: var(--shadow-md); z-index: 100; min-width: 180px;">
                <button onclick="App.exportMetadataCSV('${dataset.id}'); this.parentElement.classList.add('hidden')" style="width: 100%; border: none; border-radius: 0; justify-content: flex-start; padding: 10px 14px;">
                  📄 Metadata as CSV
                </button>
                <button onclick="App.exportMetadataExcel('${dataset.id}'); this.parentElement.classList.add('hidden')" style="width: 100%; border: none; border-radius: 0; justify-content: flex-start; padding: 10px 14px;">
                  📊 Metadata as Excel
                </button>
                <button onclick="App.exportDataset('${dataset.id}'); this.parentElement.classList.add('hidden')" style="width: 100%; border: none; border-radius: 0; justify-content: flex-start; padding: 10px 14px;">
                  📋 Metadata as JSON
                </button>
                <div style="border-top: 1px solid var(--color-border-tertiary);"></div>
                <button onclick="App.exportFullDataset('${dataset.id}'); this.parentElement.classList.add('hidden')" style="width: 100%; border: none; border-radius: 0; justify-content: flex-start; padding: 10px 14px;">
                  📦 Full Dataset (JSON)
                </button>
                <div style="border-top: 1px solid var(--color-border-tertiary);"></div>
                <button onclick="App.pushToOpenMetadata('${dataset.id}'); this.parentElement.classList.add('hidden')" style="width: 100%; border: none; border-radius: 0; justify-content: flex-start; padding: 10px 14px;">
                  🚀 Push to OpenMetadata
                </button>
              </div>
            </div>
          </div>
        </div>
        
        ${state.augmenting ? `
          <div class="card mb-3" style="background: var(--color-background-info);">
            <p class="font-medium mb-1" style="color: var(--color-text-info);">Augmentation in progress...</p>
            <div class="text-sm" style="color: var(--color-text-info);">
              ${state.augmentLog.map(log => `<p style="margin: 4px 0;">${log}</p>`).join('')}
            </div>
          </div>
        ` : ''}
        
        <div class="grid-2">
          <!-- Metadata Form -->
          <div>
            <div class="flex justify-between items-center mb-2">
              <h3 class="card-title">Metadata</h3>
              <div class="flex gap-2">
                ${(() => {
                  const emptyFields = state.schema.filter(f => {
                    const val = dataset.metadata?.[f.name];
                    return !val || (Array.isArray(val) && val.length === 0);
                  });
                  const aiFields = emptyFields.filter(f => f.aiInfer);
                  if (aiFields.length > 0) {
                    return `<button class="btn-sm" onclick="App.augmentEmptyFields('${dataset.id}')" ${state.augmenting ? 'disabled' : ''}>
                      🤖 Fill ${aiFields.length} Empty
                    </button>`;
                  }
                  return '<span class="badge badge-success">✓ All fields filled</span>';
                })()}
              </div>
            </div>
            <div class="card">
              ${state.schema.map(field => {
                const value = dataset.metadata?.[field.name];
                const isEmpty = !value || (Array.isArray(value) && value.length === 0);
                const isInferring = state.inferringField === field.id;
                const canInfer = field.aiInfer === true;
                return `
                <div class="form-group" style="position: relative;">
                  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                    <label style="margin-bottom: 0;">
                      ${field.name}
                      ${field.required ? '<span class="text-danger">*</span>' : ''}
                      ${isEmpty ? '<span class="badge badge-warning" style="margin-left: 6px;">Empty</span>' : ''}
                    </label>
                    ${canInfer ? `
                      <button class="btn-sm" 
                              onclick="App.inferSingleField('${dataset.id}', '${field.id}')" 
                              ${state.augmenting || isInferring ? 'disabled' : ''}
                              style="padding: 4px 10px; font-size: 0.75rem; background: var(--color-background-info); color: var(--color-text-info); border: none;"
                              title="Use AI to infer this field">
                        ${isInferring ? '⏳ Inferring...' : '🤖 Infer'}
                      </button>
                    ` : ''}
                  </div>
                  ${renderMetadataInput(dataset, field)}
                </div>
              `}).join('')}
            </div>
          </div>
          
          <!-- Statistics -->
          <div>
            <h3 class="card-title mb-2">Statistics</h3>
            ${stats ? `
              <div class="grid-2 mb-2" style="grid-template-columns: 1fr 1fr;">
                <div class="metric-card">
                  <p class="metric-label">Total Rows</p>
                  <p class="metric-value">${formatNumber(stats.rowCount)}</p>
                </div>
                <div class="metric-card">
                  <p class="metric-label">Total Columns</p>
                  <p class="metric-value">${stats.colCount}</p>
                </div>
              </div>
              
              <div class="card mb-2">
                <h4 class="text-sm font-medium mb-2">Column Statistics</h4>
                <div class="table-container" style="max-height: 300px; overflow-y: auto;">
                  <table>
                    <thead>
                      <tr>
                        <th>Column</th>
                        <th class="text-right">Fill %</th>
                        <th class="text-right">Unique</th>
                        <th class="text-center">Type</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${stats.columns.map(col => `
                        <tr>
                          <td style="max-width: 120px; overflow: hidden; text-overflow: ellipsis;" title="${col.name}">
                            ${col.name}
                          </td>
                          <td class="text-right">
                            <span class="${col.fillRate >= 90 ? 'text-success' : col.fillRate >= 50 ? 'text-warning' : 'text-danger'}">
                              ${col.fillRate}%
                            </span>
                          </td>
                          <td class="text-right">${formatNumber(col.uniqueCount)}</td>
                          <td class="text-center">
                            <span class="badge ${col.isNumeric ? 'badge-info' : 'badge-secondary'}" 
                                  style="background: var(--color-background-secondary);">
                              ${col.isNumeric ? 'num' : col.isDate ? 'date' : 'text'}
                            </span>
                          </td>
                        </tr>
                      `).join('')}
                    </tbody>
                  </table>
                </div>
              </div>
              
              <div class="card">
                <h4 class="text-sm font-medium mb-2">Fill Rate Distribution</h4>
                <div class="chart-container">
                  <canvas id="fillChart"></canvas>
                </div>
              </div>
            ` : '<p class="text-muted">No statistics available</p>'}
          </div>
        </div>
        
        <!-- Data Preview -->
        <div class="mt-3">
          <h3 class="card-title mb-2">Data Preview</h3>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  ${(dataset.data?.headers || []).slice(0, 12).map(h => `<th>${h}</th>`).join('')}
                  ${(dataset.data?.headers?.length || 0) > 12 ? '<th class="text-muted">...</th>' : ''}
                </tr>
              </thead>
              <tbody>
                ${(dataset.data?.rows || []).slice(0, 15).map(row => `
                  <tr>
                    ${row.slice(0, 12).map(cell => `
                      <td style="max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                        ${cell || '<span class="text-muted">—</span>'}
                      </td>
                    `).join('')}
                    ${(dataset.data?.headers?.length || 0) > 12 ? '<td></td>' : ''}
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    `;
  };
  
  /**
   * Render metadata input field based on type
   */
  const renderMetadataInput = (dataset, field) => {
    const value = dataset.metadata?.[field.name] || '';
    const id = `meta-${field.id}`;
    
    switch (field.type) {
      case 'longtext':
        return `<textarea id="${id}" 
                          rows="3" 
                          onchange="App.updateMetadata('${dataset.id}', '${field.name}', this.value)"
                >${value}</textarea>`;
      
      case 'enum':
        return `<select id="${id}" onchange="App.updateMetadata('${dataset.id}', '${field.name}', this.value)">
                  <option value="">Select...</option>
                  ${(field.options || []).map(opt => `
                    <option value="${opt}" ${value === opt ? 'selected' : ''}>${opt}</option>
                  `).join('')}
                </select>`;
      
      case 'tags':
        const tags = Array.isArray(value) ? value.join(', ') : value;
        return `<input type="text" 
                       id="${id}" 
                       value="${tags}" 
                       onchange="App.updateMetadata('${dataset.id}', '${field.name}', this.value.split(',').map(s=>s.trim()).filter(Boolean))"
                       placeholder="tag1, tag2, tag3">`;
      
      case 'boolean':
        return `<select id="${id}" onchange="App.updateMetadata('${dataset.id}', '${field.name}', this.value === 'true')">
                  <option value="">Select...</option>
                  <option value="true" ${value === true ? 'selected' : ''}>Yes</option>
                  <option value="false" ${value === false ? 'selected' : ''}>No</option>
                </select>`;
      
      case 'date':
        return `<input type="date" 
                       id="${id}" 
                       value="${value}" 
                       onchange="App.updateMetadata('${dataset.id}', '${field.name}', this.value)">`;
      
      case 'number':
        return `<input type="number" 
                       id="${id}" 
                       value="${value}" 
                       onchange="App.updateMetadata('${dataset.id}', '${field.name}', parseFloat(this.value))">`;
      
      case 'url':
        return `<input type="url" 
                       id="${id}" 
                       value="${value}" 
                       onchange="App.updateMetadata('${dataset.id}', '${field.name}', this.value)"
                       placeholder="https://...">`;
      
      default:
        return `<input type="text" 
                       id="${id}" 
                       value="${value}" 
                       onchange="App.updateMetadata('${dataset.id}', '${field.name}', this.value)">`;
    }
  };
  
  /**
   * Render toast notification
   */
  const renderToast = () => {
    if (!state.toast) return '';
    return `<div class="toast toast-${state.toast.type}">${state.toast.msg}</div>`;
  };
  
  /**
   * Main render function
   */
  const render = () => {
    const app = document.getElementById('app');
    
    app.innerHTML = `
      ${renderNav()}
      ${state.view === 'settings' ? renderSettings() : 
        state.view === 'schema' ? renderSchema() : 
        renderDatasets()}
      ${renderToast()}
    `;
    
    // Initialize chart if on dataset detail view
    if (state.currentDataset && document.getElementById('fillChart')) {
      renderFillChart();
    }
  };
  
  /**
   * Render fill rate chart
   */
  const renderFillChart = () => {
    const stats = computeStats(state.currentDataset.data);
    if (!stats) return;
    
    const ctx = document.getElementById('fillChart');
    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: stats.columns.slice(0, 15).map(c => 
          c.name.length > 10 ? c.name.slice(0, 10) + '...' : c.name
        ),
        datasets: [{
          data: stats.columns.slice(0, 15).map(c => c.fillRate),
          backgroundColor: stats.columns.slice(0, 15).map(c => 
            c.fillRate >= 90 ? '#1D9E75' : 
            c.fillRate >= 50 ? '#EF9F27' : '#E24B4A'
          ),
          borderRadius: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { 
          legend: { display: false }
        },
        scales: {
          y: { 
            beginAtZero: true, 
            max: 100,
            ticks: { 
              callback: v => v + '%',
              color: isDark ? '#a0a0a0' : '#666666'
            },
            grid: {
              color: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)'
            }
          },
          x: { 
            ticks: { 
              maxRotation: 45, 
              minRotation: 45,
              color: isDark ? '#a0a0a0' : '#666666'
            },
            grid: { display: false }
          }
        }
      }
    });
  };

  // ============================================
  // PUBLIC API
  // ============================================
  
  return {
    /**
     * Initialize the application
     */
    init: () => {
      loadState();
      render();
    },
    
    /**
     * Navigate to a view
     */
    navigate: (view) => {
      state.view = view;
      state.currentDataset = null;
      render();
    },
    
    /**
     * Update a setting
     */
    updateSetting: (key, value) => {
      state.settings[key] = value;
      if (key === 'provider') {
        // For custom provider, use the custom config model name
        if (value === 'custom') {
          state.settings.model = state.settings.providers.custom.customConfig.modelName;
        } else {
          state.settings.model = state.settings.providers[value].models[0];
        }
      }
      render();
    },
    
    /**
     * Update Custom Model settings
     */
    updateCustomModelSetting: (key, value) => {
      state.settings.providers.custom.customConfig[key] = value;
      // Also update the model in main settings if it's the model name
      if (key === 'modelName') {
        state.settings.model = value;
      }
      saveState();
      render();
    },
    
    /**
     * Test LLM connection
     */
    testConnection: async () => {
      // Custom provider doesn't always need an API key (local models)
      if (state.settings.provider !== 'custom' && !state.settings.apiKey) {
        showToast('Please enter an API key', 'error');
        return;
      }
      
      // For custom provider, check endpoint is configured
      if (state.settings.provider === 'custom') {
        const endpoint = state.settings.providers.custom.customConfig.endpoint;
        if (!endpoint) {
          showToast('Please configure the API endpoint URL', 'error');
          return;
        }
      }
      
      showToast('Testing connection...', 'info');
      
      try {
        const response = await callLLM('Say "Connection successful!" and nothing else.');
        if (response) {
          showToast('Connection successful!', 'success');
        } else {
          throw new Error('Empty response');
        }
      } catch (error) {
        showToast(`Connection failed: ${error.message}`, 'error');
      }
    },
    
    /**
     * Update OpenMetadata settings
     */
    updateOpenMetadataSetting: (key, value) => {
      state.settings.openMetadata[key] = value;
      render();
    },
    
    /**
     * Update Google Search settings
     */
    updateWebSearchSetting: (key, value) => {
      if (!state.settings.webSearch) {
        state.settings.webSearch = { enabled: false };
      }

    /**
     * Helper to make OpenMetadata API calls through proxy
     */
    omFetch: async (endpoint, options = {}) => {
      const { url, jwtToken } = state.settings.openMetadata;
      const targetUrl = `${url}${endpoint}`;
      const proxyUrl = `/proxy/${targetUrl}`;
      
      const headers = { ...options.headers };
      if (jwtToken) {
        headers['Authorization'] = `Bearer ${jwtToken}`;
      }
      if (options.body) {
        headers['Content-Type'] = 'application/json';
      }
      
      const response = await fetch(proxyUrl, {
        ...options,
        headers
      });
      
      return response;
    },
    
    /**

     */
    ensureOpenMetadataStructure: async (serviceName, databaseName, schemaName) => {
      console.log('Creating OpenMetadata structure:', { serviceName, databaseName, schemaName });
      
      // Step 1: Try to create service (ignore 409 if exists)
      const servicePayload = {
        name: serviceName,
        serviceType: 'CustomDatabase',
        description: 'Dataset Metadata Augmenter - Cataloged research datasets',
        connection: {
          config: {
            type: 'CustomDatabase',
            sourcePythonClass: 'metadata.ingestion.source.database.customdatabase.metadata.CustomDatabaseSource',
            connectionOptions: {}
          }
        }
      };
      
      console.log('Creating service:', JSON.stringify(servicePayload, null, 2));
      const serviceResp = await App.omFetch('/api/v1/services/databaseServices', {
        method: 'POST',
        body: JSON.stringify(servicePayload)
      });
      
      const serviceRespText = await serviceResp.text();
      console.log('Service response:', serviceResp.status, serviceRespText);
      
      // Check for success or conflict (409 = already exists, which is OK)
      let serviceStatus = serviceResp.status;
      
      // Fallback: check if response body contains conflict info (proxy may return 500 with conflict in body)
      if (serviceStatus === 500 && serviceRespText.includes('409')) {
        console.log('Detected 409 conflict in response body, treating as success');
        serviceStatus = 409;
      }
      
      const serviceOk = serviceStatus >= 200 && serviceStatus < 300;
      const serviceConflict = serviceStatus === 409;
      
      if (!serviceOk && !serviceConflict) {
        let errMsg = `HTTP ${serviceStatus}`;
        try {
          const err = JSON.parse(serviceRespText);
          errMsg = err.message || err.error || errMsg;
        } catch (e) {
          errMsg = serviceRespText || errMsg;
        }
        throw new Error(`Service creation failed: ${errMsg}`);
      }
      console.log('Service ready', serviceConflict ? '(already exists)' : '(created)');
      
      // Step 2: Create database (ignore 409 if exists)
      const dbPayload = {
        name: databaseName,
        service: serviceName,
        description: 'Datasets cataloged via Dataset Metadata Augmenter'

      console.log('Creating database:', JSON.stringify(dbPayload, null, 2));

      console.log('Database response:', dbResp.status, dbRespText);
      
      // Check for success or conflict
      let dbStatus = dbResp.status;
      if (dbStatus === 500 && dbRespText.includes('409')) {
        console.log('Detected 409 conflict in response body, treating as success');
        dbStatus = 409;
      }
      
      const dbOk = dbStatus >= 200 && dbStatus < 300;
      const dbConflict = dbStatus === 409;
      
      if (!dbOk && !dbConflict) {
        let errMsg = `HTTP ${dbStatus}`;
        try {
          const err = JSON.parse(dbRespText);
          errMsg = err.message || err.error || errMsg;
        } catch (e) {
          errMsg = dbRespText || errMsg;
        }
        throw new Error(`Database creation failed: ${errMsg}`);
      }
      console.log('Database ready', dbConflict ? '(already exists)' : '(created)');
      
      // Step 3: Create schema (ignore 409 if exists)
      const dbFqn = `${serviceName}.${databaseName}`;
      const schemaPayload = {
        name: schemaName,
        database: dbFqn,
        description: 'Default schema for cataloged datasets'
      };
      
      console.log('Creating schema:', JSON.stringify(schemaPayload, null, 2));
      const schemaResp = await App.omFetch('/api/v1/databaseSchemas', {
        method: 'POST',
        body: JSON.stringify(schemaPayload)
      });
      
      const schemaRespText = await schemaResp.text();
      console.log('Schema response:', schemaResp.status, schemaRespText);
      
      // Check for success or conflict
      let schemaStatus = schemaResp.status;
      if (schemaStatus === 500 && schemaRespText.includes('409')) {
        console.log('Detected 409 conflict in response body, treating as success');
        schemaStatus = 409;
      }
      
      const schemaOk = schemaStatus >= 200 && schemaStatus < 300;
      const schemaConflict = schemaStatus === 409;
      
      if (!schemaOk && !schemaConflict) {
        let errMsg = `HTTP ${schemaStatus}`;
        try {
          const err = JSON.parse(schemaRespText);
          errMsg = err.message || err.error || errMsg;
        } catch (e) {
          errMsg = schemaRespText || errMsg;
        }
        throw new Error(`Schema creation failed: ${errMsg}`);

    /**
     * Push dataset to OpenMetadata
     */
    pushToOpenMetadata: async (datasetId) => {
      const dataset = state.datasets.find(d => d.id === datasetId);
      if (!dataset) return;
      
      const { url, jwtToken, serviceName, databaseName } = state.settings.openMetadata;
      
      if (!url) {
        showToast('Please configure OpenMetadata in Settings', 'error');
        return;
      }
      
      showToast('Pushing to OpenMetadata...', 'info');
      
      try {
        // Generate a clean table name from dataset name
        const tableName = dataset.name
          .replace(/\.[^.]+$/, '')  // Remove extension
          .replace(/[^a-zA-Z0-9_]/g, '_')  // Replace special chars
          .replace(/_+/g, '_')  // Collapse multiple underscores
          .replace(/^_|_$/g, '')  // Remove leading/trailing underscores
          .toLowerCase()
          .substring(0, 128);  // Max length
        
        const schemaName = 'default';
        
        // First ensure the service/database/schema structure exists
        const schemaFqn = await App.ensureOpenMetadataStructure(serviceName, databaseName, schemaName);
        console.log('Schema FQN:', schemaFqn);
        
        // Build rich description from all metadata fields
        const descriptionParts = [];
        
        // Add main description/abstract if available
        const mainDesc = dataset.metadata?.description || dataset.metadata?.abstract || 
                        dataset.metadata?.['Dataset Name'] || dataset.name;
        if (mainDesc) descriptionParts.push(mainDesc);
        
        // Add key metadata as markdown sections
        const metadataFields = [
          { key: 'authoring_entity', label: 'Authoring Entity' },
          { key: 'Source Agency', label: 'Source Agency' },
          { key: 'source_url', label: 'Source URL' },
          { key: 'Source URL', label: 'Source URL' },
          { key: 'geog_coverage', label: 'Geographic Coverage' },
          { key: 'Geographic Coverage', label: 'Geographic Coverage' },
          { key: 'time_periods', label: 'Time Period' },
          { key: 'Temporal Coverage', label: 'Temporal Coverage' },
          { key: 'universe', label: 'Universe' },
          { key: 'sampling_procedure', label: 'Sampling' },
          { key: 'access_policy', label: 'Access Policy' },
          { key: 'license', label: 'License' },
          { key: 'cit_req', label: 'Citation' }
        ];
        
        const metadataSection = metadataFields
          .filter(f => dataset.metadata?.[f.key])
          .map(f => `**${f.label}:** ${dataset.metadata[f.key]}`)
          .join('\n\n');
        
        if (metadataSection) {
          descriptionParts.push('\n---\n' + metadataSection);
        }
        
        const description = descriptionParts.join('\n\n') || `Dataset: ${dataset.name}`;
        
        // Build columns from dataset headers with stats
        const stats = computeStats(dataset.data);
        const columns = (dataset.data?.headers || []).map((colName, index) => {
          const colStats = stats?.columns?.[index];
          
          // Build column description with stats
          let colDescription = `Column: ${colName}`;
          if (colStats) {
            const statParts = [];
            statParts.push(`Fill rate: ${colStats.fillRate}%`);
            statParts.push(`Unique: ${colStats.uniqueCount}`);
            if (colStats.isNumeric) {
              statParts.push(`Range: ${colStats.min} - ${colStats.max}`);
            }
            if (colStats.sample) {
              statParts.push(`Sample: ${colStats.sample.slice(0, 3).join(', ')}`);
            }
            colDescription = statParts.join(' | ');
          }
          
          // Determine data type
          let dataType = 'STRING';
          if (colStats?.isNumeric) {
            dataType = colStats.hasDecimals ? 'DOUBLE' : 'BIGINT';
          } else if (colStats?.isDate) {
            dataType = 'DATE';
          }
          
          return {
            name: colName.replace(/[^a-zA-Z0-9_]/g, '_').substring(0, 128),
            displayName: colName,
            dataType: dataType,
            description: colDescription
          };
        });
        
        // Note: Tags require pre-existing classifications in OpenMetadata
        // Skip tags for now to avoid "tag instance not found" errors
        
        // Create table payload - databaseSchema must be the FQN string
        const tablePayload = {
          name: tableName,
          displayName: dataset.metadata?.title || dataset.metadata?.['Dataset Name'] || dataset.name,
          description: description,
          tableType: 'Regular',
          columns: columns.length > 0 ? columns : [{ name: 'data', dataType: 'STRING', description: 'Data column' }],
          databaseSchema: schemaFqn  // This is the FQN: service.database.schema
        };
        
        console.log('Creating table with payload:', JSON.stringify(tablePayload, null, 2));
        
        // Use PUT for upsert (create or update)
        const tableResponse = await App.omFetch('/api/v1/tables', {
          method: 'PUT',
          body: JSON.stringify(tablePayload)
        });
        
        const responseText = await tableResponse.text();
        console.log('Table response:', tableResponse.status, responseText);
        
        if (tableResponse.ok) {
          const result = JSON.parse(responseText);
          const fqn = result.fullyQualifiedName || `${schemaFqn}.${tableName}`;
          
          showToast(`✅ Pushed to OpenMetadata: ${result.name}`, 'success');
          
          // Mark dataset as synced
          dataset.openMetadataFqn = fqn;
          dataset.openMetadataSyncedAt = new Date().toISOString();
          saveState();
          render();
        } else {
          let errorMsg = `HTTP ${tableResponse.status}`;
          try {
            const err = JSON.parse(responseText);
            errorMsg = err.message || err.error || errorMsg;
          } catch (e) {
            errorMsg = responseText || errorMsg;
          }
          throw new Error(errorMsg);
        }
        
      } catch (error) {
        console.error('OpenMetadata push error:', error);
        showToast(`❌ Push failed: ${error.message}`, 'error');
      }
    },

        if (fileName.endsWith('.xlsx') || fileName.endsWith('.xls')) {
          const arrayBuffer = await file.arrayBuffer();
          data = parseExcel(arrayBuffer);
